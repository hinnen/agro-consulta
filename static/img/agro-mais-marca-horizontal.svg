      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="55%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="gradSol" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
  </defs>
  <!-- Emblema circular -->
  <circle cx="82" cy="80" r="68" fill="url(#gradSol)" stroke="#f97316" stroke-width="3"/>
  <ellipse cx="82" cy="108" rx="52" ry="22" fill="#16a34a" opacity="0.95"/>
  <path d="M38 102 Q82 88 126 102" fill="none" stroke="#ecfccb" stroke-width="2" opacity="0.9"/>
  <path d="M48 108 Q82 98 116 108" fill="none" stroke="#bbf7d0" stroke-width="1.5" opacity="0.85"/>
  <path d="M118 62 Q132 48 142 58 Q130 72 118 62" fill="#22c55e"/>
  <path d="M128 70 Q138 58 148 68" fill="none" stroke="#15803d" stroke-width="2" stroke-linecap="round"/>
  <!-- Silhuetas simplificadas -->
