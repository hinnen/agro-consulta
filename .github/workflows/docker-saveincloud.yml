# Build e push da imagem para o Docker Hub (SaveinCloud / contêiner personalizado).
# Secrets no GitHub (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME — usuário do Docker Hub
#   DOCKERHUB_TOKEN — Access Token (hub.docker.com → Account Settings → Security)
name: Docker SaveinCloud

on:
  workflow_dispatch:
  push:
    branches:
      - feat/saveincloud-docker

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/agro-consulta:saveincloud
