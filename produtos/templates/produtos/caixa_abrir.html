<!DOCTYPE html>
<html lang="pt-br" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abrir caixa | Agro Mais</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 h-full overflow-hidden text-slate-800 flex flex-col">
  <header class="border-b border-slate-200 bg-white shadow-sm">
    <div class="max-w-lg mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-lg font-black uppercase text-slate-900">Abrir caixa</h1>
      <a href="{% url 'caixa_painel' %}" class="text-xs font-black uppercase text-slate-600">Painel</a>
    </div>
  </header>
  <main class="max-w-lg mx-auto px-4 py-6 flex-1 min-h-0 overflow-y-auto">
    <form method="post" class="space-y-4 bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
      {% csrf_token %}
      <div>
        <label class="text-[10px] font-black uppercase text-slate-500 block mb-1" for="valor_abertura">Valor em gaveta (fundo de troco)</label>
        <input type="text" name="valor_abertura" id="valor_abertura" value="0" inputmode="decimal" class="w-full rounded-xl border-2 border-slate-200 px-4 py-3 font-black text-lg" placeholder="0,00">
      </div>
      <div>
        <label class="text-[10px] font-black uppercase text-slate-500 block mb-1" for="observacao_abertura">Observação (opcional)</label>
        <textarea name="observacao_abertura" id="observacao_abertura" rows="2" class="w-full rounded-xl border-2 border-slate-200 px-4 py-3 font-bold text-sm"></textarea>
      </div>
      <p class="text-[10px] text-slate-400 leading-snug">As vendas enviadas ao ERP com este navegador ficam vinculadas a esta sessão enquanto o caixa estiver aberto.</p>
      <button type="submit" class="w-full py-3.5 rounded-xl bg-emerald-600 text-white font-black uppercase">Confirmar abertura</button>
    </form>
  </main>
{% include "produtos/_atalho_voltar_pdv.html" %}
</body>
</html>
