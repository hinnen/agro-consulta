<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agro Mais | Ajuste Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

  <div class="p-3 bg-white shadow-sm flex justify-between items-center sticky top-0 z-50 gap-2">
    <a href="/" class="text-slate-400 bg-slate-50 p-2 rounded-xl hover:bg-slate-100 transition-colors" title="Voltar ao PDV">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </a>

    <h2 class="font-black uppercase italic text-sm flex-1 whitespace-nowrap overflow-hidden text-ellipsis">
      Ajuste <span class="text-emerald-500">Mobile</span>
    </h2>

    <div class="flex gap-2 shrink-0">
      <a href="/historico/" class="bg-slate-100 text-slate-600 border border-slate-200 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex items-center whitespace-nowrap">
        Histórico
      </a>

      <button onclick="startScan()" class="bg-slate-900 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase flex items-center whitespace-nowrap">
        Escanear
      </button>
    </div>
  </div>

  <div id="reader" class="w-full hidden"></div>

  <div class="p-4 space-y-4">
    <input
      type="text"
      id="busca"
      placeholder="Buscar produto, GM ou EAN..."
      class="w-full p-4 rounded-2xl border-none shadow-md font-bold outline-none focus:ring-2 focus:ring-emerald-500"
      autocomplete="off"
    >

    <div id="lista" class="space-y-2">
      <div class="text-center text-slate-400 font-bold p-8">Pronto! Digite para buscar.</div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center p-6 z-[100]">
    <div class="bg-white w-full rounded-[2rem] p-6 shadow-2xl">
      <h3 id="m-nome" class="font-black uppercase text-sm mb-4"></h3>

      <div class="space-y-2 mb-4">
        <div class="text-xs text-slate-500 font-bold uppercase">Saldo atual</div>
        <div id="m-saldo" class="text-3xl font-black text-emerald-500">0</div>
      </div>

      <div class="space-y-2 mb-6">
        <label class="text-xs text-slate-500 font-bold uppercase">Novo saldo</label>
        <input
          id="m-novo"
          type="number"
          step="0.001"
          class="w-full border border-slate-200 rounded-2xl p-4 text-2xl font-black outline-none focus:ring-2 focus:ring-emerald-500"
        >
      </div>

      <button onclick="salvar()" class="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl uppercase italic mb-2">
        Salvar Agora
      </button>

      <button onclick="fechar()" class="w-full text-slate-400 font-bold text-[10px] uppercase py-2">
        Cancelar
      </button>
    </div>
  </div>

<script>
let scanner;
let pSel = null;
let debounceTimer = null;

function startScan() {
  document.getElementById('reader').classList.remove('hidden');
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (txt) => {
      document.getElementById('busca').value = txt;
      buscar(txt);
      if (scanner) scanner.stop();
      document.getElementById('reader').classList.add('hidden');
    }
  );
}

function buscar(q) {
  const termo = String(q || '').trim();
  const l = document.getElementById('lista');

  if (termo.length < 2) {
    l.innerHTML = '<div class="text-center text-slate-400 font-bold p-8">Digite ao menos 2 caracteres.</div>';
    return;
  }

  l.innerHTML = '<div class="text-center text-slate-400 font-bold p-8">Buscando...</div>';

  fetch(`{% url 'api_buscar_mobile' %}?q=${encodeURIComponent(termo)}`)
    .then(res => res.json())
    .then(data => {
      const resultados = data.produtos || [];
      l.innerHTML = '';

      if (!resultados.length) {
        l.innerHTML = '<div class="text-center text-slate-400 font-bold p-8">Nenhum produto encontrado.</div>';
        return;
      }

      resultados.slice(0, 20).forEach(p => {
        const d = document.createElement('div');
        d.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50";
        d.innerHTML = `
          <div class="min-w-0 pr-3">
            <div class="font-black text-xs uppercase truncate">${p.nome || ''}</div>
            <div class="text-[9px] text-slate-400 truncate">${p.marca || ''}</div>
            <div class="text-[9px] text-slate-500 truncate">GM: ${p.codigo_nfe || p.codigo || ''}</div>
          </div>
          <div class="text-emerald-500 font-black">${Number(p.saldo_centro || 0).toFixed(1)}</div>
        `;
        d.onclick = () => {
          pSel = p;
          abrir();
        };
        l.appendChild(d);
      });
    })
    .catch(() => {
      l.innerHTML = '<div class="text-center text-red-500 font-bold p-8">Erro de conexão.</div>';
    });
}

document.getElementById('busca').addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => buscar(e.target.value), 120);
});

function abrir() {
  document.getElementById('m-nome').innerText = pSel.nome || '';
  document.getElementById('m-saldo').innerText = Number(pSel.saldo_centro || 0).toFixed(1);
  document.getElementById('m-novo').value = Number(pSel.saldo_centro || 0).toFixed(1);
  document.getElementById('modal').classList.replace('hidden', 'flex');
  document.getElementById('m-novo').focus();
}

function fechar() {
  document.getElementById('modal').classList.replace('flex', 'hidden');
}

function salvar() {
  const fd = new FormData();
  fd.append('produto_id', pSel.id);
  fd.append('nome_produto', pSel.nome);
  fd.append('saldo_atual', pSel.saldo_centro_erp ?? pSel.saldo_erp_centro ?? pSel.saldo_centro ?? 0);
  fd.append('novo_saldo', document.getElementById('m-novo').value);
  fd.append('deposito', 'centro');
  fd.append('pin', 'SESSAO');

  fetch("{% url 'api_ajustar_estoque' %}", {
    method: 'POST',
    body: fd,
    headers: { 'X-CSRFToken': '{{ csrf_token }}' }
  })
  .then(res => res.json())
  .then(d => {
    if (d.ok) {
      fechar();
      buscar(document.getElementById('busca').value);
    } else {
      alert(d.erro || 'Erro ao salvar ajuste.');
    }
  })
  .catch(() => alert('Falha na comunicação com o servidor.'));
}
</script>

</body>
</html>
