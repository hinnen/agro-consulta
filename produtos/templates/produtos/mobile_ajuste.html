<!DOCTYPE html>
<html lang="pt-br" class="h-[100dvh] max-h-[100dvh] overflow-hidden">
<head>
  <meta charset="UTF-8">
  <title>Agro Mais | Ajuste Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --ma-kb-inset: 0px;
    }
    /* Lista: folga extra quando o teclado virtual reduz a área visível (iOS/Android). */
    .ma-scroll-lista {
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      scroll-padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px) + var(--ma-kb-inset));
      padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px) + var(--ma-kb-inset));
    }
    .ma-modal-pad {
      padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px) + var(--ma-kb-inset));
    }
  </style>
</head>
<body class="bg-slate-100 h-[100dvh] max-h-[100dvh] overflow-hidden flex flex-col touch-manipulation">

  <header class="shrink-0 z-50 bg-white shadow-sm border-b border-slate-100 pt-[env(safe-area-inset-top,0px)]">
    <div class="p-2.5 sm:p-3 flex justify-between items-center gap-2 min-h-[3rem]">
      <a href="/" class="inline-flex items-center gap-1 text-slate-500 bg-slate-50 p-2 rounded-xl hover:bg-slate-100 transition-colors shrink-0" title="Voltar ao PDV">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <kbd class="pointer-events-none hidden sm:inline rounded border border-slate-200 bg-white px-1 py-0.5 font-mono text-[9px] font-black text-slate-500">F1</kbd>
      </a>

      <h2 class="font-black uppercase italic text-xs sm:text-sm flex-1 min-w-0 text-center truncate px-1">
        Ajuste <span class="text-emerald-500">Mobile</span>
      </h2>

      <div class="flex gap-1.5 shrink-0">
        <a href="/historico/" class="bg-slate-100 text-slate-600 border border-slate-200 px-2.5 py-2 sm:px-3 rounded-xl text-[9px] sm:text-[10px] font-black uppercase whitespace-nowrap">
          Hist.
        </a>
        <button type="button" onclick="startScan()" class="bg-slate-900 text-white px-2.5 py-2 sm:px-3 rounded-xl text-[9px] sm:text-[10px] font-black uppercase whitespace-nowrap">
          Scan
        </button>
      </div>
    </div>
  </header>

  <div id="reader" class="w-full hidden shrink-0 max-h-[min(40vh,240px)] overflow-hidden bg-black"></div>

  <!-- Busca fora da área rolável: não some ao rolar e não empurra itens sob o teclado sem scroll próprio. -->
  <div class="shrink-0 z-40 px-3 pt-2 pb-2 bg-slate-100/95 backdrop-blur-sm border-b border-slate-200/80">
    <label for="busca" class="sr-only">Buscar produto</label>
    <input
      type="search"
      id="busca"
      placeholder="Nome, GM ou código de barras…"
      enterkeyhint="search"
      inputmode="search"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      class="w-full px-4 py-3.5 rounded-2xl border border-slate-200/90 shadow-sm bg-white text-base font-bold text-slate-900 outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-400"
    >
    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wide mt-1.5 px-0.5 leading-snug">Lista abaixo rola com o dedo — continua visível acima do teclado.</p>
  </div>

  <div id="lista-scroll" class="flex-1 min-h-0 overflow-y-auto ma-scroll-lista px-3 pt-2">
    <div id="lista" class="space-y-2">
      <div class="text-center text-slate-400 font-bold py-10 px-4 text-sm">Carregando produtos…</div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 z-[100] hidden flex-col justify-end sm:justify-center sm:p-6 bg-black/60 backdrop-blur-sm" role="dialog" aria-modal="true" aria-labelledby="m-nome" aria-hidden="true" onclick="if (event.target === this) fechar()">
    <div class="bg-white w-full sm:max-w-md sm:mx-auto rounded-t-[1.75rem] sm:rounded-[2rem] shadow-2xl flex flex-col max-h-[min(92dvh,100%)] overflow-hidden outline-none" onclick="event.stopPropagation()">
      <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain p-5 sm:p-6 space-y-4">
        <h3 id="m-nome" class="font-black uppercase text-sm leading-snug text-slate-900 pr-8"></h3>

        <div class="space-y-1">
          <div class="text-[10px] text-slate-500 font-black uppercase tracking-wide">Saldo atual (Centro)</div>
          <div id="m-saldo" class="text-3xl font-black text-emerald-600 tabular-nums">0</div>
        </div>

        <div class="space-y-2">
          <label for="m-novo" class="text-[10px] text-slate-500 font-black uppercase tracking-wide">Novo saldo</label>
          <input
            id="m-novo"
            type="text"
            inputmode="decimal"
            enterkeyhint="done"
            class="w-full border-2 border-slate-200 rounded-2xl px-4 py-3.5 text-2xl font-black tabular-nums text-slate-900 outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-400"
          >
        </div>
      </div>

      <div class="shrink-0 border-t border-slate-100 bg-white ma-modal-pad px-5 sm:px-6 pt-3 space-y-2 shadow-[0_-8px_24px_rgba(15,23,42,0.06)]">
        <button type="button" onclick="salvar()" class="w-full bg-emerald-600 text-white font-black py-3.5 rounded-2xl uppercase text-sm tracking-wide active:scale-[0.99] transition-transform">
          Salvar
        </button>
        <button type="button" onclick="fechar()" class="w-full text-slate-500 font-bold text-xs uppercase py-2.5">
          Cancelar
        </button>
      </div>
    </div>
  </div>

{% include "produtos/_js_busca_produto_inteligente.html" %}
<script>
let scanner;
let pSel = null;
let debounceTimer = null;
let baseProdutos = [];
const MOBILE_POLL_SALDOS_MS = 8000;
let mobilePollSaldosTimer = null;

function normalizar(texto) {
  return String(texto || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function aplicarSaldosMobile(rows) {
  if (!Array.isArray(rows) || rows.length === 0 || !baseProdutos.length) return false;
  const map = new Map();
  rows.forEach((r) => {
    if (r && r[0] != null && r.length >= 5) map.set(String(r[0]), r);
  });
  let mudou = false;
  baseProdutos.forEach((p) => {
    const row = map.get(String(p.id));
    if (!row) return;
    const nc = Number(row[1]);
    const nv = Number(row[2]);
    const nec = Number(row[3]);
    const nev = Number(row[4]);
    if (
      Number(p.saldo_centro) !== nc ||
      Number(p.saldo_vila) !== nv ||
      Number(p.saldo_erp_centro) !== nec ||
      Number(p.saldo_erp_vila) !== nev
    ) {
      mudou = true;
    }
    p.saldo_centro = nc;
    p.saldo_vila = nv;
    p.saldo_erp_centro = nec;
    p.saldo_erp_vila = nev;
  });
  if (mudou && pSel) {
    const u = baseProdutos.find((x) => String(x.id) === String(pSel.id));
    if (u) pSel = u;
  }
  if (mudou) {
    const q = document.getElementById('busca').value;
    if (normalizarBuscaLocal(q).length >= 2) buscar(q);
    const modal = document.getElementById('modal');
    if (pSel && modal && !modal.classList.contains('hidden')) {
      document.getElementById('m-saldo').innerText = Number(pSel.saldo_centro || 0).toFixed(1);
    }
  }
  return mudou;
}

function pollSaldosMobileUmaVez() {
  if (!baseProdutos.length || document.visibilityState !== 'visible') return;
  fetch("{% url 'api_pdv_saldos' %}", { cache: 'no-store' })
    .then((r) => r.json())
    .then((d) => {
      if (d.rows) aplicarSaldosMobile(d.rows);
    })
    .catch(() => {});
}

function iniciarPollSaldosMobile() {
  if (mobilePollSaldosTimer) clearInterval(mobilePollSaldosTimer);
  mobilePollSaldosTimer = setInterval(pollSaldosMobileUmaVez, MOBILE_POLL_SALDOS_MS);
  setTimeout(pollSaldosMobileUmaVez, 2500);
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') pollSaldosMobileUmaVez();
});

window.addEventListener('load', () => {
  const listaDiv = document.getElementById('lista');

  fetch("{% url 'api_todos_produtos_local' %}")
    .then(res => res.json())
    .then(data => {
      baseProdutos = data.produtos || [];
      listaDiv.innerHTML = '<div class="text-center text-slate-400 font-bold p-8">Pronto! Digite para buscar.</div>';
      iniciarPollSaldosMobile();
    })
    .catch(() => {
      listaDiv.innerHTML = '<div class="text-center text-red-500 font-bold p-8">Erro ao carregar produtos.</div>';
    });
});

function startScan() {
  document.getElementById('reader').classList.remove('hidden');
  scanner = new Html5Qrcode("reader");
  const w = Math.min(window.innerWidth || 360, 360);
  const qrbox = Math.max(140, Math.min(250, Math.floor(w * 0.72)));

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: qrbox },
    (txt) => {
      document.getElementById('busca').value = txt;
      buscar(txt);
      if (scanner) scanner.stop();
      document.getElementById('reader').classList.add('hidden');
    }
  ).catch(() => {
    document.getElementById('reader').classList.add('hidden');
    alert('Não foi possível iniciar a câmera.');
  });
}

function buscar(q) {
  const termoOriginal = String(q || '').trim();
  const termoN = normalizarBuscaLocal(termoOriginal);
  const l = document.getElementById('lista');

  if (termoN.length < 2) {
    l.innerHTML = '<div class="text-center text-slate-400 font-bold p-8">Digite ao menos 2 caracteres.</div>';
    return;
  }

  const resultados = filtrarProdutosBuscaInteligente(baseProdutos, termoN, 'normal').slice(0, 40);

  l.innerHTML = '';

  if (!resultados.length) {
    l.innerHTML = '<div class="text-center text-slate-400 font-bold p-8">Nenhum produto encontrado.</div>';
    return;
  }

  resultados.forEach(p => {
    const d = document.createElement('div');
    d.className = "bg-white p-3.5 sm:p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center gap-3 active:bg-slate-50 min-h-[3.25rem]";
    d.innerHTML = `
      <div class="min-w-0 pr-3">
        <div class="font-black text-xs uppercase truncate">${p.nome || ''}</div>
        <div class="text-[9px] text-slate-400 truncate">${p.marca || ''}</div>
        <div class="text-[9px] text-slate-500 truncate">GM: ${p.codigo_nfe || p.codigo || ''}</div>
      </div>
      <div class="text-emerald-600 font-black text-lg tabular-nums shrink-0">${Number(p.saldo_centro || 0).toFixed(1)}</div>
    `;
    d.onclick = () => {
      pSel = p;
      abrir();
    };
    l.appendChild(d);
  });
}

document.getElementById('busca').addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => buscar(e.target.value), 120);
});

function abrir() {
  const modal = document.getElementById('modal');
  document.getElementById('m-nome').innerText = pSel.nome || '';
  document.getElementById('m-saldo').innerText = Number(pSel.saldo_centro || 0).toFixed(1);
  document.getElementById('m-novo').value = Number(pSel.saldo_centro || 0).toFixed(1);
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  modal.setAttribute('aria-hidden', 'false');
  document.body.classList.add('overflow-hidden');
  syncMaKeyboardInset();
  requestAnimationFrame(() => {
    const inp = document.getElementById('m-novo');
    if (inp) inp.focus({ preventScroll: true });
  });
}

function fechar() {
  const modal = document.getElementById('modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  modal.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('overflow-hidden');
  syncMaKeyboardInset();
}

/** Espaço extra no rodapé da lista / modal quando o teclado virtual reduz a visualViewport. */
function syncMaKeyboardInset() {
  const root = document.documentElement;
  if (!window.visualViewport) {
    root.style.setProperty('--ma-kb-inset', '0px');
    return;
  }
  const vv = window.visualViewport;
  const inset = Math.max(0, window.innerHeight - vv.height - Math.max(0, vv.offsetTop));
  root.style.setProperty('--ma-kb-inset', inset + 'px');
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', syncMaKeyboardInset);
  window.visualViewport.addEventListener('scroll', syncMaKeyboardInset);
}
window.addEventListener('orientationchange', () => setTimeout(syncMaKeyboardInset, 350));
window.addEventListener('load', () => setTimeout(syncMaKeyboardInset, 100));

(function bindMaTecladoInputs() {
  const b = document.getElementById('busca');
  const m = document.getElementById('m-novo');
  if (b) {
    b.addEventListener('focus', syncMaKeyboardInset);
    b.addEventListener('blur', () => setTimeout(syncMaKeyboardInset, 280));
  }
  if (m) {
    m.addEventListener('focus', syncMaKeyboardInset);
    m.addEventListener('blur', () => setTimeout(syncMaKeyboardInset, 280));
  }
})();

function salvar() {
  if (!pSel) return;

  const fd = new FormData();
  fd.append('produto_id', pSel.id);
  fd.append('nome_produto', pSel.nome || '');
  fd.append('saldo_atual', pSel.saldo_centro_erp ?? pSel.saldo_erp_centro ?? pSel.saldo_centro ?? 0);
  fd.append('novo_saldo', document.getElementById('m-novo').value);
  fd.append('deposito', 'centro');
  fd.append('pin', 'SESSAO');

  fetch("{% url 'api_ajustar_estoque' %}", {
    method: 'POST',
    body: fd,
    headers: { 'X-CSRFToken': '{{ csrf_token }}' }
  })
  .then(res => res.json())
  .then(d => {
    if (d.ok) {
      fechar();
      buscar(document.getElementById('busca').value);
    } else {
      alert(d.erro || 'Erro ao salvar ajuste.');
    }
  })
  .catch(() => alert('Falha na comunicação com o servidor.'));
}
</script>

</html>
