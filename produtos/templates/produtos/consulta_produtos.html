<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta</title>

<style>
body { font-family: Arial; background:#f3f4f6; margin:0; }
.container { max-width:1100px; margin:20px auto; }

.search-box {
    width:100%;
    font-size:24px;
    padding:18px;
    border-radius:16px;
    border:3px solid #2563eb;
}

.autocomplete {
    background:#fff;
    border-radius:12px;
    margin-top:5px;
    display:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.autocomplete.open { display:block; }

.suggestion {
    padding:12px;
    cursor:pointer;
}

.suggestion:hover, .active {
    background:#eff6ff;
}

.results { margin-top:20px; }

.card {
    background:#fff;
    padding:20px;
    border-radius:16px;
    margin-bottom:15px;
}

.nome {
    font-size:22px;
    font-weight:bold;
}

.meta {
    font-size:13px;
    color:#555;
    margin-bottom:10px;
}

.estoques {
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:10px;
}

/* CENTRO destaque */
.centro {
    background:#ecfdf5;
    border:2px solid #22c55e;
    padding:15px;
    border-radius:12px;
}

.centro .valor {
    font-size:32px;
    font-weight:bold;
    color:#15803d;
}

/* outros menores */
.pequeno {
    background:#f8fafc;
    padding:10px;
    border-radius:12px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<input id="busca" class="search-box" placeholder="Digite para buscar..." autofocus>

<div id="autocomplete" class="autocomplete"></div>

<div id="resultados" class="results"></div>

</div>

<script>

const input = document.getElementById("busca");
const auto = document.getElementById("autocomplete");
const resultados = document.getElementById("resultados");

let sugestoes = [];
let selecionado = -1;
let podeBuscar = false;

function renderSugestoes(q){
    if(!sugestoes.length){
        auto.classList.remove("open");
        return;
    }

    auto.innerHTML = sugestoes.map((s,i)=>`
        <div class="suggestion ${i===selecionado?'active':''}" data-i="${i}">
            ${s.nome}
        </div>
    `).join("");

    auto.classList.add("open");

    auto.querySelectorAll(".suggestion").forEach(el=>{
        el.onclick = ()=>{
            selecionar(el.dataset.i);
        }
    });
}

function selecionar(i){
    const item = sugestoes[i];
    if(!item) return;

    input.value = item.nome;
    auto.classList.remove("open");

    podeBuscar = true;
    buscar(item.nome);
}

async function buscar(q){
    if(!podeBuscar) return;

    resultados.innerHTML = "Carregando...";

    const res = await fetch(`/produtos/api/buscar/?q=${q}`);
    const data = await res.json();

    resultados.innerHTML = data.produtos.map(p=>`
        <div class="card">
            <div class="nome">${p.nome}</div>
            <div class="meta">
                Código: ${p.codigo_interno} |
                Barras: ${p.codigo_barras}
            </div>

            <div class="estoques">
                <div class="centro">
                    CENTRO
                    <div class="valor">${p.saldo_centro}</div>
                </div>

                <div class="pequeno">
                    VILA<br>${p.saldo_vila}
                </div>

                <div class="pequeno">
                    TOTAL<br>${p.saldo_total}
                </div>
            </div>
        </div>
    `).join("");

    podeBuscar = false;
}

input.addEventListener("input", async ()=>{
    const q = input.value.trim();

    podeBuscar = false;
    resultados.innerHTML = "";

    if(q.length < 2){
        auto.classList.remove("open");
        return;
    }

    const res = await fetch(`/produtos/api/sugestoes/?q=${q}`);
    const data = await res.json();

    sugestoes = data.sugestoes;
    selecionado = 0;

    renderSugestoes(q);
});

input.addEventListener("keydown", e=>{
    if(!sugestoes.length) return;

    if(e.key === "ArrowDown"){
        selecionado = (selecionado + 1) % sugestoes.length;
        renderSugestoes(input.value);
    }

    if(e.key === "ArrowUp"){
        selecionado = (selecionado - 1 + sugestoes.length) % sugestoes.length;
        renderSugestoes(input.value);
    }

    if(e.key === "Enter"){
        e.preventDefault();
        selecionar(selecionado);
    }
});

</script>

</body>
</html>
