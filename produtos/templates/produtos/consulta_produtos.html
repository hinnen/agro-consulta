<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Mais | PDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 p-4 text-slate-800">

    <div class="max-w-5xl mx-auto flex flex-wrap items-center justify-between mb-6 gap-4">
        <h1 class="text-3xl font-black italic tracking-tighter text-slate-900">
            AGRO <span class="text-emerald-500">MAIS</span>
        </h1>
        
        <div class="flex gap-2">
            <a href="/transferencias/" class="flex items-center gap-2 bg-white px-4 py-2 rounded-2xl shadow-sm border border-emerald-100 text-emerald-700 font-bold hover:bg-emerald-50 transition-all">
                🚚 Logística
            </a>
            <a href="/historico/" class="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-all">
                Ver Histórico
            </a>
        </div>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-4">
            <input type="text" id="busca-produto" placeholder="Buscar milho, ração, código..." 
                class="w-full p-5 rounded-3xl shadow-lg border-none text-xl font-medium outline-none focus:ring-4 focus:ring-emerald-500/20 transition-all">

            <div id="lista-produtos" class="space-y-4">
                </div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 sticky top-4">
                <h3 class="text-slate-400 font-bold uppercase tracking-wider text-sm mb-4">🛒 Orçamento</h3>
                
                <input type="text" id="nome-cliente" placeholder="Nome do Cliente" 
                    class="w-full p-3 bg-slate-50 rounded-2xl border-none mb-4 outline-none focus:ring-2 focus:ring-emerald-500">

                <div id="itens-carrinho" class="min-h-[100px] max-h-[400px] overflow-y-auto mb-4 space-y-2 hide-scroll">
                    <p class="text-slate-300 text-center text-sm py-4">Carrinho vazio</p>
                </div>

                <div class="flex justify-between items-end mb-6 border-t pt-4">
                    <span class="font-black text-slate-900 uppercase">Total</span>
                    <span id="total-geral" class="font-black text-emerald-500 text-3xl">R$ 0,00</span>
                </div>

                <button onclick="finalizarNoWhatsApp()" 
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-3xl shadow-lg transition-all active:scale-95 uppercase tracking-widest">
                    Finalizar e Enviar
                </button>
            </div>
        </div>
    </div>

<script>
let carrinho = [];

// Busca de produtos - Usando a rota que o Django espera
document.getElementById('busca-produto').addEventListener('input', function(e) {
    const q = e.target.value;
    if (q.length < 2) return;

    // Tentamos a rota direta do seu app
    fetch("/api/buscar/?q=" + q)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('lista-produtos');
            container.innerHTML = '';
            if (!data.produtos || data.produtos.length === 0) return;

            data.produtos.forEach(p => {
                container.innerHTML += `
                    <div onclick="addCarrinho('${p.id}', '${p.nome}', ${p.preco_venda})" 
                         class="bg-white p-6 rounded-[2rem] shadow-sm hover:shadow-md border border-slate-100 transition-all cursor-pointer flex justify-between items-center group active:scale-[0.98]">
                        <div>
                            <h4 class="font-black text-slate-700 italic uppercase mb-1 group-hover:text-emerald-600">${p.codigo_interno} - ${p.nome}</h4>
                            <span class="text-3xl font-black text-emerald-500">R$ ${p.preco_venda.toFixed(2)}</span>
                        </div>
                        <div class="text-right">
                             <div class="bg-blue-50 px-4 py-2 rounded-2xl">
                                <span class="block text-[10px] uppercase font-bold text-blue-400 text-center">Centro</span>
                                <span class="text-2xl font-black text-blue-600">${p.saldo_centro}</span>
                             </div>
                             <div class="mt-1 text-slate-400 font-bold text-xs">Vila: ${p.saldo_vila}</div>
                        </div>
                    </div>`;
            });
        });
});

function addCarrinho(id, nome, preco) {
    const item = carrinho.find(i => i.id === id);
    if (item) item.qtd++; else carrinho.push({id, nome, preco, qtd: 1});
    atualizarCarrinho();
}

function atualizarCarrinho() {
    const container = document.getElementById('itens-carrinho');
    const totalDisplay = document.getElementById('total-geral');
    let total = 0;
    container.innerHTML = '';

    carrinho.forEach((item, index) => {
        const subtotal = item.preco * item.qtd;
        total += subtotal;
        container.innerHTML += `
            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl mb-2">
                <div class="text-xs font-bold text-slate-600">${item.qtd}x ${item.nome}</div>
                <div class="flex items-center gap-2">
                    <span class="text-emerald-600 font-bold">R$ ${subtotal.toFixed(2)}</span>
                    <button onclick="event.stopPropagation(); removerItem(${index})" class="text-red-400 font-bold px-2">✕</button>
                </div>
            </div>`;
    });
    if (!carrinho.length) container.innerHTML = '<p class="text-slate-300 text-center text-sm py-4">Carrinho vazio</p>';
    totalDisplay.innerText = `R$ ${total.toFixed(2)}`;
}

function removerItem(i) { carrinho.splice(i, 1); atualizarCarrinho(); }

function finalizarNoWhatsApp() {
    if (!carrinho.length) return alert("Carrinho vazio!");
    const cliente = document.getElementById('nome-cliente').value || "Consumidor";
    let msg = `*ORÇAMENTO - AGRO MAIS*\n*Cliente:* ${cliente}\n----------------------------\n`;
    let total = 0;
    carrinho.forEach(i => {
        msg += `${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2)}\n`;
        total += i.preco * i.qtd;
    });
    msg += `----------------------------\n*TOTAL: R$ ${total.toFixed(2)}*`;
    window.open(`https://wa.me/5513996727222?text=${encodeURIComponent(msg)}`, '_blank');
}
</script>
</body>
</html>
