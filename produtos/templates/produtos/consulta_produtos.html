<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agro Mais | PDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-4 font-sans text-slate-800">

    <div class="max-w-5xl mx-auto flex items-center justify-between mb-6">
        <h1 class="text-3xl font-black italic text-slate-900">AGRO <span class="text-emerald-500">MAIS</span></h1>
        <div class="flex gap-2">
            <a href="/transferencias/" class="bg-white px-4 py-2 rounded-2xl shadow-sm border font-bold text-emerald-700">🚚 Logística</a>
            <a href="/historico/" class="bg-white px-4 py-2 rounded-2xl shadow-sm border font-bold text-slate-600">Ver Histórico</a>
        </div>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-4">
            <input type="text" id="busca-produto" placeholder="Buscar milho..." class="w-full p-5 rounded-3xl shadow-lg outline-none text-xl">
            <div id="lista-produtos" class="space-y-4"></div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl sticky top-4">
                <h3 class="text-slate-400 font-bold uppercase text-sm mb-4">🛒 Orçamento</h3>
                <input type="text" id="nome-cliente" placeholder="Nome do Cliente" class="w-full p-3 bg-slate-50 rounded-2xl mb-4 outline-none">
                <div id="itens-carrinho" class="min-h-[100px] max-h-[400px] overflow-y-auto mb-4 space-y-2"></div>
                <div class="flex justify-between items-end mb-6 border-t pt-4">
                    <span class="font-black text-slate-900">TOTAL</span>
                    <span id="total-geral" class="font-black text-emerald-500 text-3xl">R$ 0,00</span>
                </div>
                <button onclick="finalizarNoWhatsApp()" class="w-full bg-emerald-500 text-white font-black py-5 rounded-3xl shadow-lg uppercase">Finalizar</button>
            </div>
        </div>
    </div>

<script>
let carrinho = [];

document.getElementById('busca-produto').addEventListener('input', function(e) {
    const q = e.target.value;
    if (q.length < 2) return;
    fetch("/api/buscar/?q=" + q)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('lista-produtos');
            container.innerHTML = '';
            data.produtos.forEach(p => {
                container.innerHTML += `
                    <div onclick="addCarrinho('${p.id}', '${p.nome}', ${p.preco_venda})" class="bg-white p-6 rounded-[2rem] shadow-sm border cursor-pointer flex justify-between items-center hover:shadow-md">
                        <div>
                            <h4 class="font-black text-slate-700 uppercase mb-1">${p.codigo_interno} - ${p.nome}</h4>
                            <span class="text-3xl font-black text-emerald-500">R$ ${p.preco_venda.toFixed(2)}</span>
                        </div>
                        <div class="text-right bg-blue-50 px-4 py-2 rounded-2xl">
                            <span class="block text-[10px] font-bold text-blue-400">CENTRO</span>
                            <span class="text-2xl font-black text-blue-600">${p.saldo_centro}</span>
                        </div>
                    </div>`;
            });
        });
});

function addCarrinho(id, nome, preco) {
    const item = carrinho.find(i => i.id === id);
    if (item) item.qtd++; else carrinho.push({id, nome, preco, qtd: 1});
    atualizarCarrinho();
}

function atualizarCarrinho() {
    const container = document.getElementById('itens-carrinho');
    const totalDisplay = document.getElementById('total-geral');
    let total = 0;
    container.innerHTML = '';
    carrinho.forEach((item, index) => {
        total += item.preco * item.qtd;
        container.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
            <div class="text-xs font-bold">${item.qtd}x ${item.nome}</div>
            <span class="text-emerald-600 font-bold">R$ ${(item.preco * item.qtd).toFixed(2)}</span>
        </div>`;
    });
    totalDisplay.innerText = `R$ ${total.toFixed(2)}`;
}

function finalizarNoWhatsApp() {
    const cliente = document.getElementById('nome-cliente').value || "Cliente";
    let msg = `*ORÇAMENTO - AGRO MAIS*\n*Cliente:* ${cliente}\n`;
    carrinho.forEach(i => { msg += `${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2)}\n`; });
    msg += `*TOTAL: R$ ${document.getElementById('total-geral').innerText}*`;
    window.open(`https://wa.me/5513996727222?text=${encodeURIComponent(msg)}`, '_blank');
}
</script>
</body>
</html>
