<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agro Mais | PDV Rápido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-slate-200 p-4 font-sans select-none">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-slate-800 italic uppercase">Agro <span class="text-green-600">Mais</span></h1>
            <div class="text-[10px] font-black text-slate-400 bg-white px-4 py-2 rounded-full border shadow-sm">BUSCADOR ATIVO</div>
        </header>

        <div class="relative mb-6">
            <input type="text" id="busca" autofocus placeholder="Digite ou Bipe o Produto..." 
                   class="w-full p-6 rounded-[32px] border-4 border-white shadow-2xl text-2xl font-bold outline-none focus:ring-4 focus:ring-green-400">
        </div>

        <div id="lista" class="space-y-4 pb-28"></div>
    </div>

    <div id="modal_ajuste" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-[40px] p-8 w-full max-w-md shadow-2xl border-8 border-slate-100">
            <h2 id="m_nome" class="text-xl font-black text-slate-800 uppercase text-center mb-6">Ajustar Estoque</h2>
            <div class="space-y-4">
                <input type="number" id="m_novo" placeholder="SALDO REAL" class="w-full p-5 rounded-2xl bg-slate-50 border-2 text-center text-4xl font-black text-blue-600 outline-none">
                <input type="password" id="m_pin" placeholder="PIN VENDEDOR" class="w-full p-5 rounded-2xl bg-slate-50 border-2 text-center text-2xl font-black outline-none">
                <div class="flex gap-2 pt-4">
                    <button onclick="fechar()" class="flex-1 p-5 rounded-2xl font-black text-slate-400 uppercase">Sair</button>
                    <button onclick="salvar()" class="flex-1 bg-slate-900 text-white p-5 rounded-2xl font-black uppercase shadow-xl">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cursor = -1;
        let p_selecionado = null;
        let produtos = [];
        const input = document.getElementById('busca');
        const lista = document.getElementById('lista');

        input.addEventListener('input', async (e) => {
            const q = e.target.value;
            if (q.length < 2) { lista.innerHTML = ''; return; }
            
            const res = await fetch(`/api/buscar/?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            produtos = data.produtos || [];
            lista.innerHTML = '';
            cursor = -1;
            
            produtos.forEach((p, idx) => {
                lista.innerHTML += `
                <div id="item-${idx}" onclick="abrirAjuste(${idx})" class="card bg-white rounded-[40px] p-6 shadow-md border-4 border-transparent flex justify-between items-center cursor-pointer transition-all">
                    <div class="flex-1">
                        <h3 class="text-xl font-black text-slate-800 uppercase italic"><strong>${p.codigo_interno}</strong> - ${p.nome}</h3>
                        <div class="mt-4"><span class="text-5xl font-black text-green-600">R$ ${p.preco_venda.toFixed(2)}</span></div>
                    </div>
                    <div class="flex flex-col items-end gap-2 text-right">
                        <div class="bg-blue-50 p-4 rounded-[35px] border-2 border-blue-100 min-w-[150px]">
                            <span class="block text-[10px] font-black text-blue-400 uppercase">CENTRO</span>
                            <span class="text-6xl font-black text-blue-700">${p.saldo_centro}</span>
                        </div>
                        <div class="pr-2">
                            <p class="text-xl font-bold text-slate-400">Vila: <b class="text-slate-700">${p.saldo_vila}</b></p>
                            <p class="text-2xl font-black text-slate-500 italic underline">Total: ${p.saldo_centro + p.saldo_vila}</p>
                        </div>
                    </div>
                </div>`;
            });
        });

        input.addEventListener('keydown', (e) => {
            const cards = document.querySelectorAll('.card');
            if (e.key === "ArrowDown") cursor = Math.min(cursor + 1, cards.length - 1);
            else if (e.key === "ArrowUp") cursor = Math.max(cursor - 1, 0);
            else if (e.key === "Enter" && cursor > -1) { abrirAjuste(cursor); return; }
            
            cards.forEach((c, i) => {
                c.classList.toggle('border-green-400', i === cursor);
                c.classList.toggle('bg-green-50', i === cursor);
                if(i === cursor) c.scrollIntoView({ block: 'nearest' });
            });
        });

        function abrirAjuste(idx) {
            p_selecionado = produtos[idx];
            document.getElementById('m_nome').innerText = p_selecionado.nome;
            document.getElementById('m_novo').value = '';
            document.getElementById('m_pin').value = '';
            document.getElementById('modal_ajuste').classList.remove('hidden');
            setTimeout(() => document.getElementById('m_novo').focus(), 100);
        }

        async function salvar() {
            const fd = new FormData();
            fd.append('produto_id', p_selecionado.id);
            fd.append('nome_produto', p_selecionado.nome);
            fd.append('codigo_interno', p_selecionado.codigo_interno);
            fd.append('saldo_atual', p_selecionado.saldo_centro);
            fd.append('novo_saldo', document.getElementById('m_novo').value);
            fd.append('pin', document.getElementById('m_pin').value);
            const res = await fetch('/api/ajustar-estoque/', { method: 'POST', body: fd, headers: {'X-CSRFToken': '{{ csrf_token }}'} });
            if(res.ok) location.reload(); else alert("ERRO NO PIN");
        }

        function fechar() { document.getElementById('modal_ajuste').classList.add('hidden'); input.focus(); }
    </script>
</body>
</html>
