<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Produtos</title>
    <link rel="icon" href="/static/favicon.ico" />

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .box {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        h1 { margin: 0 0 10px; font-size: 28px; }

        .campo-busca {
            width: 100%;
            height: 72px;
            padding: 0 22px;
            font-size: 24px;
            border: 3px solid #2563eb;
            border-radius: 18px;
        }

        .resultado-item { border-bottom: 1px solid #e5e7eb; padding: 14px 0; }

        .ok { color: #166534; font-weight: bold; }
        .baixo { color: #b91c1c; font-weight: bold; }

        .botao-ajuste {
            margin-left: 6px;
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .destaque {
            background: #f9fafb;
            border: 2px solid #dbeafe;
            border-radius: 18px;
            padding: 24px;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="box">
        <h1>Consulta Rápida de Produtos</h1>
        <input id="busca" class="campo-busca" placeholder="Digite para buscar..." autofocus />
    </div>

    <div class="box">
        <div id="resultados">Digite algo para pesquisar.</div>
    </div>

</div>

<script>
const campoBusca = document.getElementById("busca");
const resultadosEl = document.getElementById("resultados");

function getCookie(name) {
    let v = null;
    document.cookie.split(";").forEach(c => {
        c = c.trim();
        if (c.startsWith(name + "=")) {
            v = decodeURIComponent(c.substring(name.length + 1));
        }
    });
    return v;
}

function fnum(v){ return Number(v||0).toLocaleString("pt-BR"); }
function fmoeda(v){ return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }

async function ajustarSaldo(id, codigo, nome, deposito, saldoErp){
    const novo = prompt(`Novo saldo para ${nome}\n(ERP atual: ${fnum(saldoErp)})`);
    if(!novo) return;

    const fd = new FormData();
    fd.append("produto_id", id);
    fd.append("codigo_interno", codigo);
    fd.append("nome_produto", nome);
    fd.append("deposito", deposito);
    fd.append("saldo_atual", saldoErp);
    fd.append("novo_saldo", novo);

    const r = await fetch("/produtos/api/ajustar-estoque/", {
        method:"POST",
        headers:{ "X-CSRFToken": getCookie("csrftoken") },
        body: fd
    });

    buscarProdutos(campoBusca.value);
}

function montarResultados(produtos){

    if(!produtos.length){
        resultadosEl.innerHTML = "Nenhum produto encontrado";
        return;
    }

    // ⭐ DESTAQUE 1 PRODUTO
    if(produtos.length === 1){
        const p = produtos[0];

        resultadosEl.innerHTML = `
        <div class="destaque">
            <h2 style="font-size:32px;">${p.nome}</h2>
            <p>Preço: <b>${fmoeda(p.preco_venda)}</b></p>

            <p>
                Centro: <b>${fnum(p.saldo_centro)}</b>
                <button class="botao-ajuste" onclick="ajustarSaldo('${p.id}','${p.codigo_interno}','${p.nome}','centro',${p.saldo_centro_erp})">Ajustar</button>
            </p>

            <p>
                Vila: <b>${fnum(p.saldo_vila)}</b>
                <button class="botao-ajuste" onclick="ajustarSaldo('${p.id}','${p.codigo_interno}','${p.nome}','vila',${p.saldo_vila_erp})">Ajustar</button>
            </p>

            <p><b>Total: ${fnum(p.saldo_total)}</b></p>

            <p style="font-size:14px;">
                ERP Centro: ${fnum(p.saldo_centro_erp)} |
                Ajuste: ${fnum(p.diferenca_centro)}
            </p>
        </div>`;
        return;
    }

    // lista normal
    let html = "";

    produtos.forEach(p=>{
        html += `
        <div class="resultado-item">
            <b>${p.nome}</b><br>
            Preço: ${fmoeda(p.preco_venda)}<br>

            Centro: ${fnum(p.saldo_centro)}
            <button class="botao-ajuste" onclick="ajustarSaldo('${p.id}','${p.codigo_interno}','${p.nome}','centro',${p.saldo_centro_erp})">Ajustar</button>

            | Vila: ${fnum(p.saldo_vila)}
            <button class="botao-ajuste" onclick="ajustarSaldo('${p.id}','${p.codigo_interno}','${p.nome}','vila',${p.saldo_vila_erp})">Ajustar</button>

            | Total: ${fnum(p.saldo_total)}
        </div>`;
    });

    resultadosEl.innerHTML = html;
}

async function buscarProdutos(q){
    if(!q){ resultadosEl.innerHTML="Digite algo"; return; }

    const r = await fetch(`/produtos/api/buscar/?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    montarResultados(d.produtos||[]);
}

campoBusca.addEventListener("input",()=>{
    clearTimeout(window.t);
    window.t = setTimeout(()=>buscarProdutos(campoBusca.value),200);
});
</script>

</body>
</html>
