<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Produtos</title>
    <link rel="icon" href="/static/favicon.ico" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .box {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            line-height: 1.2;
        }

        .subtitulo {
            margin: 0 0 18px 0;
            color: #6b7280;
            font-size: 16px;
        }

        .campo-busca {
            width: 100%;
            height: 72px;
            padding: 0 22px;
            font-size: 24px;
            border: 3px solid #2563eb;
            border-radius: 18px;
            outline: none;
            background: #fff;
        }

        .campo-busca:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        h2 {
            margin: 0 0 22px 0;
            font-size: 24px;
        }

        .mensagem {
            font-size: 16px;
            color: #6b7280;
        }

        .erro {
            color: #b91c1c;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 16px;
        }

        .resultado-item {
            padding: 14px 0 18px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .resultado-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .resultado-nome {
            margin: 0 0 8px 0;
            font-size: 22px;
            line-height: 1.25;
        }

        .resultado-info {
            margin: 3px 0;
            color: #4b5563;
            font-size: 14px;
        }

        .resultado-preco {
            margin-top: 8px;
            font-size: 18px;
        }

        .resultado-preco strong {
            color: #1f2937;
        }

        .resultado-saldos {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            font-size: 14px;
        }

        .saldo-label {
            font-weight: 700;
        }

        .ok {
            color: #b91c1c;
            font-weight: 700;
        }

        .baixo {
            color: #b91c1c;
            font-weight: 700;
        }

        .separador {
            color: #6b7280;
            margin: 0 4px;
        }

        .botao-ajuste {
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: #374151;
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
        }

        .botao-ajuste:hover {
            background: #f3f4f6;
            border-color: #9ca3af;
        }

        .loading {
            color: #2563eb;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .box {
                padding: 18px;
                border-radius: 16px;
            }

            h1 {
                font-size: 22px;
            }

            h2 {
                font-size: 22px;
            }

            .campo-busca {
                height: 58px;
                font-size: 20px;
                padding: 0 16px;
            }

            .resultado-nome {
                font-size: 18px;
            }

            .resultado-saldos {
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Consulta Rápida de Produtos</h1>
            <p class="subtitulo">Digite nome, código, marca ou bipar código de barras.</p>
            <input
                type="text"
                id="busca"
                class="campo-busca"
                placeholder="Digite para buscar..."
                autocomplete="off"
                autofocus
            />
        </div>

        <div class="box">
            <h2>Resultados</h2>

            <div id="erro-api"></div>
            <div id="resultados" class="mensagem">Digite algo para pesquisar.</div>
        </div>
    </div>

    <script>
        const campoBusca = document.getElementById("busca");
        const resultadosEl = document.getElementById("resultados");
        const erroApiEl = document.getElementById("erro-api");

        let timerBusca = null;

        function formatarMoeda(valor) {
            const numero = Number(valor || 0);
            return numero.toLocaleString("pt-BR", {
                style: "currency",
                currency: "BRL"
            });
        }

        function formatarNumero(valor) {
            const numero = Number(valor || 0);
            return numero.toLocaleString("pt-BR", {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
        }

        function escaparHtml(texto) {
            return String(texto || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escaparJs(texto) {
            return String(texto || "")
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'")
                .replace(/"/g, '\\"');
        }

        function ajustarSaldo(produtoId, nomeProduto, deposito, saldoAtual) {
            const valor = prompt(
                "Ajuste rápido\n\n" +
                "Produto: " + nomeProduto + "\n" +
                "Depósito: " + deposito + "\n" +
                "Saldo atual: " + formatarNumero(saldoAtual) + "\n\n" +
                "Digite o novo saldo ou a variação:"
            );

            if (valor === null || valor.trim() === "") {
                return;
            }

            alert(
                "Ajuste provisório informado.\n\n" +
                "Produto: " + nomeProduto + "\n" +
                "Depósito: " + deposito + "\n" +
                "Valor digitado: " + valor + "\n\n" +
                "Na próxima etapa ligamos isso à gravação real."
            );
        }

        function montarResultados(produtos) {
            if (!produtos || produtos.length === 0) {
                resultadosEl.innerHTML = '<div class="mensagem">Nenhum produto encontrado.</div>';
                return;
            }

            let html = "";

            produtos.forEach((p) => {
                const saldoCentro = Number(p.saldo_centro || 0);
                const saldoVila = Number(p.saldo_vila || 0);
                const total = Number(p.saldo_total ?? (saldoCentro + saldoVila));

                const nomeSeguroHtml = escaparHtml(p.nome || "");
                const nomeSeguroJs = escaparJs(p.nome || "");

                html += `
                    <div class="resultado-item">
                        <h3 class="resultado-nome">${nomeSeguroHtml}</h3>

                        <p class="resultado-info">
                            Código: ${escaparHtml(p.codigo_interno || "-")} |
                            Barras: ${escaparHtml(p.codigo_barras || "-")}
                        </p>

                        <p class="resultado-info">
                            Marca: ${escaparHtml(p.marca || "-")} |
                            Categoria: ${escaparHtml(p.categoria || "-")}
                        </p>

                        <p class="resultado-preco">
                            Preço: <strong>${formatarMoeda(p.preco_venda)}</strong>
                        </p>

                        <div class="resultado-saldos">
                            <span class="${saldoCentro <= 0 ? "baixo" : "ok"}">
                                <span class="saldo-label">Centro:</span> ${formatarNumero(saldoCentro)}
                            </span>
                            <button
                                class="botao-ajuste"
                                onclick="ajustarSaldo('${escaparJs(p.id)}', '${nomeSeguroJs}', 'Centro', ${saldoCentro})"
                            >
                                Ajustar
                            </button>

                            <span class="separador">|</span>

                            <span class="${saldoVila <= 0 ? "baixo" : "ok"}">
                                <span class="saldo-label">Vila Elias:</span> ${formatarNumero(saldoVila)}
                            </span>
                            <button
                                class="botao-ajuste"
                                onclick="ajustarSaldo('${escaparJs(p.id)}', '${nomeSeguroJs}', 'Vila Elias', ${saldoVila})"
                            >
                                Ajustar
                            </button>

                            <span class="separador">|</span>

                            <span class="${total <= 0 ? "baixo" : "ok"}">
                                <span class="saldo-label">Total:</span> ${formatarNumero(total)}
                            </span>
                        </div>
                    </div>
                `;
            });

            resultadosEl.innerHTML = html;
        }

        async function buscarProdutos(termo) {
            const busca = termo.trim();

            if (!busca) {
                erroApiEl.innerHTML = "";
                resultadosEl.innerHTML = '<div class="mensagem">Digite algo para pesquisar.</div>';
                return;
            }

            resultadosEl.innerHTML = '<div class="loading">Buscando...</div>';
            erroApiEl.innerHTML = "";

            try {
                const resposta = await fetch(`/produtos/api/buscar-produtos/?q=${encodeURIComponent(busca)}`);
                const dados = await resposta.json();

                if (dados.erro_api) {
                    erroApiEl.innerHTML = `<div class="erro">${escaparHtml(dados.erro_api)}</div>`;
                } else {
                    erroApiEl.innerHTML = "";
                }

                montarResultados(dados.produtos || []);
            } catch (erro) {
                erroApiEl.innerHTML = '<div class="erro">Erro ao buscar produtos. Tente novamente.</div>';
                resultadosEl.innerHTML = '<div class="mensagem">Não foi possível carregar os resultados.</div>';
            }
        }

        campoBusca.addEventListener("input", function () {
            clearTimeout(timerBusca);

            const valor = this.value;
            timerBusca = setTimeout(() => {
                buscarProdutos(valor);
            }, 250);
        });
    </script>
</body>
</html>
