/** iOS/Android: iframe oculto + print() costuma capturar a página visível; precisamos de janela real. */
function compraPrintPreferirJanela() {
  try {
    if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return true;
  } catch (_) {}
  if (typeof navigator !== 'undefined') {
    const ua = navigator.userAgent || '';
    if (/Mobi|Android|iPhone|iPad|iPod|IEMobile|webOS|Silk/i.test(ua)) return true;
  }
  return false;
}

function compraFecharJanelaPrintOpcional(win) {
  try {
    if (win && !win.closed) win.close();
  } catch (_) {}
}

/**
 * Abre já no toque do botão (antes de await fetch), para o Safari não bloquear pop-up.
 * @returns {Window|null}
 */
function compraPrepararJanelaPrintMovel() {
  if (!compraPrintPreferirJanela()) return null;
  let w = null;
  try {
    w = window.open('', '_blank');
  } catch (_) {
    w = null;
  }
  if (!w || !w.document) return null;
  try {
    w.document.write(
      '<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Relatório</title><style>html,body{min-height:100%;margin:0}body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;background:#f1f5f9;color:#334155;padding:1.25rem;text-align:center}</style></head><body><p style="font-weight:800;font-size:1.05rem">A preparar relatório…</p></body></html>'
    );
    w.document.close();
  } catch (_) {
    compraFecharJanelaPrintOpcional(w);
    return null;
  }
  return w;
}

function compraEntregarHtmlNaJanelaPrint(win, html) {
  if (!win || win.closed) return false;
  try {
    win.document.open();
    win.document.write(html);
    win.document.close();
  } catch (_) {
    return false;
  }
  const run = () => {
    try {
      win.focus();
      win.print();
    } catch (_) {}
  };
  setTimeout(run, 350);
  try {
    win.addEventListener(
      'afterprint',
      () => {
        try {
          win.close();
        } catch (_) {}
      },
      { once: true }
    );
  } catch (_) {}
  return true;
}

/** Desktop: iframe oculto (evita `window.open` bloqueado). Mobile: usar `compraPrepararJanelaPrintMovel` + `compraEntregarHtmlNaJanelaPrint`. */
function compraAbrirPrintHtml(html) {
  const ifr = document.createElement('iframe');
  ifr.setAttribute(
    'style',
    'position:fixed;right:0;bottom:0;width:0;height:0;border:0;pointer-events:none;visibility:hidden',
  );
  ifr.setAttribute('title', 'Impressão');
  document.body.appendChild(ifr);
  const rm = () => {
    try {
      ifr.remove();
    } catch (_) {}
  };
  let printed = false;
  const run = () => {
    if (printed) return;
    printed = true;
    try {
      const iw = ifr.contentWindow;
      if (iw) {
        iw.focus();
        iw.print();
      }
    } catch (_) {}
    setTimeout(rm, 1600);
  };
  const schedule = () => {
    requestAnimationFrame(() => requestAnimationFrame(run));
  };
  ifr.onload = () => schedule();
  try {
    ifr.srcdoc = html;
  } catch (_) {
    let u = '';
    try {
      u = URL.createObjectURL(new Blob([html], { type: 'text/html;charset=utf-8' }));
      ifr.onload = () => {
        schedule();
        setTimeout(() => {
          try {
            URL.revokeObjectURL(u);
          } catch (_) {}
        }, 120000);
      };
      ifr.removeAttribute('srcdoc');
      ifr.src = u;
    } catch (_) {
      rm();
      throw new Error('print_iframe');
    }
  }
  setTimeout(() => {
    if (!printed) schedule();
  }, 900);
}

let relCompraFornDdTimer = null;

function relCompraFornDdSelecionar(li, nome, id) {
  const fn = document.getElementById('rel-compra-forn-nome');
  const fid = document.getElementById('rel-compra-forn-id');
  const dd = document.getElementById('rel-compra-forn-dd');
  if (fn) fn.value = nome || '';
  if (fid) fid.value = id || '';
  if (dd) dd.classList.add('hidden');
}

async function relCompraBuscarFornecedoresDd(q) {
  const dd = document.getElementById('rel-compra-forn-dd');
  if (!dd) return;
  dd.innerHTML = '';
  const recent = lerFornecedoresRecentesCompra();
  const qn = String(q || '').trim().toLowerCase();
  const filtrados = qn ? recent.filter((x) => String(x.nome).toLowerCase().includes(qn)) : recent.slice(0, 12);
  filtrados.forEach((x) => {
    const li = document.createElement('li');
    li.setAttribute('role', 'option');
    li.className =
      'px-3 py-3 sm:py-2 cursor-pointer active:bg-violet-100 hover:bg-violet-50 text-sm font-bold border-b border-violet-50 touch-manipulation min-h-[48px] flex items-center';
    li.textContent = x.nome + (x.id ? ' · ID' : '');
    const go = (e) => {
      e.preventDefault();
      relCompraFornDdSelecionar(li, x.nome, x.id || '');
    };
    li.addEventListener('mousedown', go);
    li.addEventListener('click', go);
    dd.appendChild(li);
  });
  try {
    const u = new URL(URL_ENTRADA_NFA_FORN, window.location.origin);
    if (qn.length >= 2) u.searchParams.set('q', String(q || '').trim());
    else u.searchParams.set('inicial', '1');
    u.searchParams.set('limit', '40');
    const r = await fetch(u.toString(), { credentials: 'same-origin' });
    const j = await r.json();
    (j.itens || []).forEach((it) => {
      const li = document.createElement('li');
      li.setAttribute('role', 'option');
      li.className =
        'px-3 py-3 sm:py-2 cursor-pointer active:bg-sky-100 hover:bg-sky-50 text-sm font-semibold border-b border-slate-50 touch-manipulation min-h-[48px] flex items-center';
      const doc = it.documento ? ` · ${it.documento}` : '';
      li.textContent = `${it.nome || '—'}${doc}`;
      const go = (e) => {
        e.preventDefault();
        relCompraFornDdSelecionar(li, it.nome || '', it.id || '');
      };
      li.addEventListener('mousedown', go);
      li.addEventListener('click', go);
      dd.appendChild(li);
    });
  } catch (_) {}
  dd.classList.toggle('hidden', dd.children.length === 0);
}

function compraFmtRelatorioUlt(v) {
  if (v === null || v === undefined) return '*';
  const n = Number(v);
  if (!Number.isFinite(n)) return '*';
  return n.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
}

function compraFmtRelatorioInt(v) {
  if (v === null || v === undefined) return '—';
  const n = Number(v);
  if (!Number.isFinite(n)) return '—';
  return n.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
}

function compraFmtRelatorioVendDesdeUlt(v) {
  if (v === null || v === undefined) return '*';
  const n = Number(v);
  if (!Number.isFinite(n)) return '*';
  return n.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
}
