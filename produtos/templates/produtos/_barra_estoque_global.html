{% load static %}
{# Barra fixa: atualizar saldos (Mongo) + horário. #}
<div id="agro-barra-estoque-wrap" class="inline-flex flex-wrap items-center gap-2 rounded-xl border border-emerald-200/90 bg-gradient-to-r from-emerald-50/95 to-slate-50/90 px-2.5 py-1.5 shadow-sm" role="region" aria-label="Sincronização de estoque" title="Estoque manual. Sincronização em segundo plano quando o app fica ocioso (standby).">
  <button type="button" id="agro-btn-atualizar-saldos" class="inline-flex items-center gap-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] sm:text-[11px] font-black uppercase tracking-wide px-2.5 py-1.5 shadow-sm transition-colors shrink-0" title="Atualizar saldos Centro / Vila agora (ERP + ajustes PIN)">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>
    Estoque
  </button>
  <div class="min-w-0 flex flex-col sm:flex-row sm:items-baseline gap-0.5 sm:gap-2">
    <span class="text-[9px] font-black uppercase text-slate-500 leading-none">Última atualização</span>
    <span id="agro-saldos-ultima-atualizacao" class="text-[10px] sm:text-[11px] font-bold text-slate-700 tabular-nums leading-tight" title="Horário local da última leitura de saldos">—</span>
  </div>
</div>
<script src="{% static 'js/agro_estoque_sync.js' %}"></script>
