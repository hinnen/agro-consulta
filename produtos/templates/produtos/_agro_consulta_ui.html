{# AGRO-CONSULTA — densidade loja (14–19"), legibilidade, alto contraste. Incluir no <head> após Tailwind (e fontes Inter, se houver). #}
<style id="agro-consulta-ui">
  /* Base: levemente acima do antigo 15px, sem “estourar” layout. */
  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #0f172a;
    line-height: 1.5;
  }

  /* Atalhos F1/F5 em telas que usam .gm-kbd (vence font-size 9px inline nos templates). */
  body .gm-kbd {
    font-size: 0.7rem !important;
    line-height: 1.15 !important;
    padding: 0.22rem 0.42rem !important;
  }

  /*
   * Corpo: microtipografia + tamanhos arbitrários 12–15px e variantes sm/md (Tailwind).
   */
  body :is(
      .text-\[8px\],
      .text-\[9px\],
      .text-\[10px\],
      .text-\[11px\],
      .text-\[12px\],
      .text-\[13px\],
      .text-\[14px\],
      .text-\[15px\],
      .sm\:text-\[8px\],
      .sm\:text-\[9px\],
      .sm\:text-\[10px\],
      .sm\:text-\[11px\],
      .sm\:text-\[12px\],
      .sm\:text-\[13px\],
      .sm\:text-\[14px\],
      .sm\:text-\[15px\],
      .md\:text-\[8px\],
      .md\:text-\[9px\],
      .md\:text-\[10px\],
      .md\:text-\[11px\],
      .md\:text-\[12px\],
      .md\:text-\[13px\],
      .md\:text-\[14px\],
      .md\:text-\[15px\]
    ) {
    font-size: 0.9375rem !important;
    line-height: 1.4 !important;
  }
  body .text-xs {
    font-size: 0.9375rem !important;
    line-height: 1.4 !important;
  }
  body .text-sm {
    font-size: 0.9875rem !important;
    line-height: 1.42 !important;
  }

  body :is(button, [type="button"], [type="submit"]):not(.sspin-key) {
    box-sizing: border-box;
    max-width: 100%;
    overflow-wrap: anywhere;
    word-break: break-word;
    line-height: 1.3;
  }

  body a:where(.text-xs, .text-sm) {
    box-sizing: border-box;
    max-width: 100%;
    overflow-wrap: anywhere;
    word-break: break-word;
    line-height: 1.35;
  }

  /*
   * Popups / drawers / balões / diálogos: mesmo piso + botões contidos.
   */
  :is(
      [id^="modal-"],
      [aria-modal="true"],
      [role="dialog"],
      #modal[role="dialog"],
      #pdv-drawer-carrinho,
      #pdv-balao-aviso-estoque,
      #fx-modal,
      #sspin-root,
      #alerta-lembrete,
      #wa-toast,
      #reader
    )
    :is(
      .text-\[8px\],
      .text-\[9px\],
      .text-\[10px\],
      .text-\[11px\],
      .text-\[12px\],
      .text-\[13px\],
      .text-\[14px\],
      .text-\[15px\],
      .sm\:text-\[8px\],
      .sm\:text-\[9px\],
      .sm\:text-\[10px\],
      .sm\:text-\[11px\],
      .sm\:text-\[12px\],
      .sm\:text-\[13px\],
      .sm\:text-\[14px\],
      .sm\:text-\[15px\],
      .md\:text-\[8px\],
      .md\:text-\[9px\],
      .md\:text-\[10px\],
      .md\:text-\[11px\],
      .md\:text-\[12px\],
      .md\:text-\[13px\],
      .md\:text-\[14px\],
      .md\:text-\[15px\],
      .text-xs
    ) {
    font-size: 0.9375rem !important;
    line-height: 1.4 !important;
  }

  :is(
      [id^="modal-"],
      [aria-modal="true"],
      [role="dialog"],
      #modal[role="dialog"],
      #pdv-drawer-carrinho,
      #pdv-balao-aviso-estoque,
      #fx-modal,
      #sspin-root,
      #alerta-lembrete
    )
    .text-sm {
    font-size: 0.9875rem !important;
    line-height: 1.42 !important;
  }

  :is(
      [id^="modal-"],
      [aria-modal="true"],
      [role="dialog"],
      #modal[role="dialog"],
      #pdv-drawer-carrinho,
      #pdv-balao-aviso-estoque,
      #fx-modal,
      #sspin-root,
      #alerta-lembrete,
      #wa-toast,
      #reader
    )
    button:not(.sspin-key) {
    box-sizing: border-box;
    min-height: 2.5rem;
    min-width: 0;
    max-width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.25;
    padding-top: 0.35rem;
    padding-bottom: 0.35rem;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  :is(
      [id^="modal-"],
      [aria-modal="true"],
      [role="dialog"],
      #modal[role="dialog"],
      #pdv-drawer-carrinho,
      #pdv-balao-aviso-estoque,
      #fx-modal,
      #sspin-root,
      #alerta-lembrete,
      #wa-toast,
      #reader
    )
    :is(input[type="button"], input[type="submit"]):not(.sspin-key) {
    box-sizing: border-box;
    min-height: 2.5rem;
    min-width: 0;
    max-width: 100%;
    line-height: 1.25;
    padding-top: 0.35rem;
    padding-bottom: 0.35rem;
    text-align: center;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  :is(
      [id^="modal-"],
      [aria-modal="true"],
      [role="dialog"],
      #modal[role="dialog"],
      #pdv-drawer-carrinho,
      #pdv-balao-aviso-estoque,
      #fx-modal,
      #sspin-root,
      #reader
    )
    :is(
      input:not([type="checkbox"]):not([type="radio"]):not([type="hidden"]):not([type="range"]),
      select,
      textarea
    ) {
    box-sizing: border-box;
    min-height: 2.5rem;
    font-size: 1rem;
    line-height: 1.35;
    max-width: 100%;
  }

  @keyframes spinner-border {
    to {
      transform: rotate(360deg);
    }
  }

  /* Botões em processamento (opcional: classList.add('btn-loading') em JS). */
  .btn-loading {
    pointer-events: none !important;
    opacity: 0.7 !important;
    position: relative;
  }

  .btn-loading::after {
    content: "";
    display: inline-block;
    width: 1rem;
    height: 1rem;
    margin-left: 0.5rem;
    border: 2px solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    animation: spinner-border 0.75s linear infinite;
    vertical-align: text-bottom;
  }
</style>
