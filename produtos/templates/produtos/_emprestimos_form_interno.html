<section class="rounded-2xl border-2 border-orange-200 bg-white p-6 lg:p-8 space-y-6 shadow-sm w-full">
  <form id="form-int" class="space-y-6">
    {% csrf_token %}
    <div class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-6">
      <label class="block">
        <span class="mb-2 block text-base font-black uppercase text-slate-600">Empresa *</span>
        <div class="relative sug-wrap" data-sug-campo="empresa">
          <input type="text" id="int-empresa-nome" autocomplete="off" class="w-full min-h-[52px] rounded-xl border-2 border-slate-200 px-4 py-3 text-lg font-semibold focus:border-orange-400 outline-none" placeholder="Buscar empresa…">
          <input type="hidden" id="int-empresa-id" value="">
          <ul class="sug-dd hidden absolute left-0 right-0 top-full z-20 mt-1 bg-white border-2 border-slate-200 rounded-xl shadow-lg max-h-56 overflow-y-auto"></ul>
        </div>
      </label>
      <label class="block">
        <span class="mb-2 block text-base font-black uppercase text-slate-600">Proprietário / sócio *</span>
        <input type="text" id="int-mutuario" required list="credores-internos-list" class="w-full min-h-[52px] rounded-xl border-2 border-slate-200 px-4 py-3 text-lg font-bold focus:border-orange-400 outline-none" placeholder="Lista ou digite o nome">
        <datalist id="credores-internos-list"></datalist>
      </label>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">
      <label class="block">
        <span class="mb-2 block text-base font-black uppercase text-slate-600">Valor aporte *</span>
        <input type="text" id="int-valor-aporte" required class="w-full min-h-[52px] rounded-xl border-2 border-slate-200 px-4 py-3 text-lg font-black tabular-nums" placeholder="0,00" inputmode="decimal">
      </label>
      <label class="block">
        <span class="mb-2 block text-base font-black uppercase text-slate-600">Total a devolver *</span>
        <input type="text" id="int-valor-dev" required class="w-full min-h-[52px] rounded-xl border-2 border-slate-200 px-4 py-3 text-lg font-black tabular-nums" placeholder="0,00" inputmode="decimal">
      </label>
      <label class="block">
        <span class="mb-2 block text-base font-black uppercase text-slate-600">1º vencimento</span>
        <input type="date" id="int-primeiro-ven" class="w-full min-h-[52px] rounded-xl border-2 border-slate-200 px-4 py-3 text-lg font-bold">
      </label>
      <label class="block">
        <span class="mb-2 block text-base font-black uppercase text-slate-600">Nº parcelas *</span>
        <input type="number" id="int-parcelas" min="1" max="48" value="1" required class="w-full min-h-[52px] rounded-xl border-2 border-slate-200 px-4 py-3 text-lg font-black">
      </label>
    </div>
    <label class="block max-w-sm">
      <span class="mb-2 block text-base font-black uppercase text-slate-600">Intervalo (dias) *</span>
      <input type="number" id="int-intervalo" min="1" max="366" value="30" required class="w-full min-h-[52px] rounded-xl border-2 border-slate-200 px-4 py-3 text-lg font-black">
    </label>
    <label class="block">
      <span class="mb-2 block text-base font-black uppercase text-slate-600">Observação</span>
      <textarea id="int-obs" rows="3" class="w-full rounded-xl border-2 border-slate-200 px-4 py-3 text-lg font-semibold resize-y min-h-[6rem]"></textarea>
    </label>
    <button type="submit" id="btn-int" class="w-full sm:w-auto min-h-[56px] rounded-xl bg-orange-500 hover:bg-orange-600 px-10 py-4 text-lg font-black text-white shadow-lg uppercase tracking-wide border-2 border-orange-600 active:scale-[0.99] transition-transform">Registrar empréstimo interno</button>
  </form>
</section>
