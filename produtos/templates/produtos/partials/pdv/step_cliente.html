<section class="pdv-step-panel space-y-3" data-step-panel="cliente" hidden>

  <article class="rounded-[1.4rem] border-2 border-emerald-200/80 bg-gradient-to-br from-white to-emerald-50/40 p-4 shadow-sm sm:p-5">

    <p class="text-[11px] font-black uppercase tracking-[0.22em] text-emerald-700">Etapa 2</p>

    <h2 class="mt-1 text-2xl font-black tracking-tight text-slate-900">Cliente / dados básicos</h2>

    <p class="mt-2 text-sm font-semibold text-slate-600">Revise o cliente, retirada ou entrega e observações. Edição de contato e endereço no pop-up.</p>

  </article>



  <div class="grid gap-3 lg:grid-cols-[minmax(0,1fr)_minmax(18rem,24rem)]">

    <article class="space-y-3 rounded-[1.4rem] border-2 border-slate-200 bg-white p-4 shadow-md ring-1 ring-slate-100 sm:p-5">

      <div class="rounded-2xl border-2 border-sky-200/90 bg-gradient-to-br from-sky-50/90 to-white p-4 shadow-inner">

        <p class="text-[11px] font-black uppercase tracking-[0.18em] text-sky-800">Cliente definido</p>

        <div id="pdv-step2-client-name" class="mt-2 break-words text-xl font-black text-slate-900">Consumidor final</div>

        <div id="pdv-step2-client-doc" class="mt-1 text-sm font-bold text-slate-500">Sem documento informado</div>

        <div class="mt-3 space-y-1.5 border-t border-sky-200/80 pt-3 text-sm font-bold text-slate-700">

          <p class="text-[10px] font-black uppercase tracking-wide text-slate-500">Telefone</p>

          <div class="flex flex-wrap items-center gap-2">
            <a
              id="pdv-step2-cliente-zap"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="pdv-action-btn hidden shrink-0 rounded-xl border-2 border-green-600 bg-green-600 px-2.5 py-1.5 text-[10px] font-black uppercase text-white shadow-sm hover:bg-green-700"
              title="WhatsApp do cliente"
              aria-label="Abrir WhatsApp do cliente"
            >Zap</a>
            <p id="pdv-step2-client-tel-view" class="min-w-0 flex-1 break-words text-slate-900">—</p>
          </div>

          <p class="mt-2 text-[10px] font-black uppercase tracking-wide text-slate-500">Endereço resumido</p>

          <p id="pdv-step2-client-end-view" class="break-words text-slate-900">—</p>

        </div>

      </div>



      <div class="flex flex-wrap gap-2">

        <button type="button" id="pdv-step2-open-cliente-edit" class="pdv-action-btn border-2 border-emerald-300 bg-emerald-50 px-4 py-2 text-[11px] text-emerald-900 shadow-sm" title="Editar telefone e endereço · E">

          Editar dados <kbd class="pointer-events-none ml-1 rounded border border-emerald-400 bg-white px-1 font-mono text-[9px]">E</kbd>

        </button>

        <button type="button" id="pdv-cliente-advanced-edit" class="pdv-action-btn border-2 border-slate-200 bg-white px-4 py-2 text-[11px] text-slate-700 shadow-sm" title="Abre o cadastro completo no Agro (nova aba)">Edição avançada</button>

      </div>

    </article>



    <article class="space-y-3 rounded-[1.4rem] border-2 border-orange-200/90 bg-gradient-to-b from-white to-orange-50/30 p-4 shadow-md ring-1 ring-orange-100 sm:p-5">

      <div>

        <p class="text-[11px] font-black uppercase tracking-[0.18em] text-orange-800">Fluxo da venda</p>

        <h3 class="mt-1 text-lg font-black text-slate-900">Retirada ou entrega?</h3>

      </div>

      <div class="grid gap-2.5">

        <label class="flex cursor-pointer items-center gap-3 rounded-2xl border-2 border-emerald-300/80 bg-gradient-to-r from-emerald-50 to-teal-50/80 px-4 py-3.5 shadow-sm ring-1 ring-emerald-100 transition hover:border-emerald-400">

          <input type="radio" name="pdv-entrega-tipo" value="retirada" class="h-4 w-4 shrink-0 text-emerald-600">

          <span class="min-w-0">

            <span class="block text-sm font-black text-emerald-950">Retirada na loja <kbd class="pointer-events-none ml-1 align-middle rounded border border-emerald-500/80 bg-white px-1.5 py-0.5 font-mono text-[9px] text-emerald-900">1</kbd></span>

            <span class="block text-[11px] font-semibold text-emerald-900/80">Pula a etapa de entrega e vai direto ao fechamento.</span>

          </span>

        </label>

        <label class="flex cursor-pointer items-center gap-3 rounded-2xl border-2 border-orange-300/90 bg-gradient-to-r from-orange-50 to-amber-50 px-4 py-3.5 shadow-sm ring-1 ring-orange-100 transition hover:border-orange-400">

          <input type="radio" name="pdv-entrega-tipo" value="entrega" class="h-4 w-4 shrink-0 text-orange-600">

          <span class="min-w-0">

            <span class="block text-sm font-black text-orange-950">Entrega <kbd class="pointer-events-none ml-1 align-middle rounded border border-orange-500/80 bg-white px-1.5 py-0.5 font-mono text-[9px] text-orange-900">2</kbd></span>

            <span class="block text-[11px] font-semibold text-orange-900/85">Abre a etapa 3 com dados de entrega e repasse.</span>

          </span>

        </label>

      </div>



      <label class="block rounded-2xl border-2 border-slate-200 bg-slate-50/50 p-3 ring-1 ring-slate-100">

        <span class="mb-1.5 block text-[11px] font-black uppercase tracking-wide text-slate-500">Observação da venda</span>

        <textarea id="pdv-venda-observacao" rows="6" class="pdv-input min-h-[9rem] resize-y border-slate-200 bg-white" placeholder="Informações rápidas para o fechamento ou para a equipe."></textarea>

      </label>

    </article>

  </div>

</section>
