<section class="pdv-step-panel space-y-3" data-step-panel="cliente" hidden>

  <div class="pdv-wiz-step-bar pdv-wiz-step-bar--orange">
    <div class="min-w-0 flex-1">
      <p class="pdv-wiz-step-etapa">Etapa 2</p>
      <h2 class="pdv-wiz-step-title">Cliente / dados básicos</h2>
    </div>
    <button type="button" class="pdv-wiz-help shrink-0" data-pdv-help="cliente" title="Ajuda — cliente">?</button>
  </div>

  <div class="grid gap-3 lg:grid-cols-[minmax(0,1fr)_minmax(18rem,24rem)]">

    <div class="pdv-wiz-panel">
      <div class="pdv-wiz-block pdv-wiz-block--sky">
        <div class="pdv-wiz-block-head">
          <span class="pdv-wiz-head-icon pdv-wiz-head-icon--user" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
          </span>
          <h3 class="pdv-wiz-block-title pdv-wiz-block-title--sky">Cliente definido</h3>
        </div>

        <div class="pdv-wiz-inner-card mt-2">
          <div id="pdv-step2-client-name" class="break-words text-xl font-black text-slate-900">Consumidor final</div>
          <div id="pdv-step2-client-doc" class="mt-1 text-sm font-bold text-slate-500">Sem documento informado</div>

          <div class="mt-3 space-y-1.5 border-t border-sky-200/80 pt-3 text-sm font-bold text-slate-700">
            <p class="text-[10px] font-black uppercase tracking-wide text-slate-500">Telefone</p>
            <div class="flex flex-wrap items-center gap-2">
              <a
                id="pdv-step2-cliente-zap"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                class="pdv-action-btn hidden shrink-0 rounded-xl border-2 border-green-600 bg-green-600 px-2.5 py-1.5 text-[10px] font-black uppercase text-white shadow-sm hover:bg-green-700"
                title="WhatsApp do cliente"
                aria-label="Abrir WhatsApp do cliente"
              >Zap</a>
              <p id="pdv-step2-client-tel-view" class="min-w-0 flex-1 break-words text-slate-900">—</p>
            </div>
            <p class="mt-2 text-[10px] font-black uppercase tracking-wide text-slate-500">Endereço resumido</p>
            <p id="pdv-step2-client-end-view" class="break-words text-slate-900">—</p>
          </div>
        </div>

        <div class="mt-2 flex flex-wrap gap-2">
          <button type="button" id="pdv-step2-open-cliente-edit" class="pdv-wiz-action-btn pdv-wiz-action-btn--orange pdv-action-btn" title="Editar telefone e endereço · E">
            Editar dados <kbd class="pointer-events-none ml-1 rounded border border-orange-300 bg-white px-1 font-mono text-[9px]">E</kbd>
          </button>
          <button type="button" id="pdv-cliente-advanced-edit" class="pdv-wiz-action-btn pdv-wiz-action-btn--slate pdv-action-btn" title="Abre o cadastro completo no Agro (nova aba)">Edição avançada</button>
        </div>
      </div>
    </div>

    <div class="pdv-wiz-panel pdv-wiz-panel--orange flex flex-col">
      <div class="pdv-wiz-block pdv-wiz-block--orange flex-1">
        <div class="pdv-wiz-block-head">
          <span class="pdv-wiz-head-icon pdv-wiz-head-icon--truck" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177V9.75m0 0H8.625M16.5 7.5V4.875c0-.621-.504-1.125-1.125-1.125H4.125C3.504 3.75 3 4.254 3 4.875V18.75" /></svg>
          </span>
          <h3 class="pdv-wiz-block-title pdv-wiz-block-title--orange">Retirada ou entrega</h3>
        </div>

        <div class="mt-2 grid gap-2">
          <label class="pdv-wiz-choice pdv-wiz-choice--green">
            <input type="radio" name="pdv-entrega-tipo" value="retirada" class="h-4 w-4 shrink-0 text-emerald-600">
            <span class="min-w-0">
              <span class="block text-sm font-black text-emerald-950">Retirada na loja <kbd class="pointer-events-none ml-1 align-middle rounded border border-emerald-500/80 bg-white px-1.5 py-0.5 font-mono text-[9px] text-emerald-900">1</kbd></span>
              <span class="block text-[11px] font-semibold text-emerald-900/80">Pula a etapa de entrega e vai direto ao fechamento.</span>
            </span>
          </label>
          <label class="pdv-wiz-choice pdv-wiz-choice--orange">
            <input type="radio" name="pdv-entrega-tipo" value="entrega" class="h-4 w-4 shrink-0 text-orange-600">
            <span class="min-w-0">
              <span class="block text-sm font-black text-orange-950">Entrega <kbd class="pointer-events-none ml-1 align-middle rounded border border-orange-500/80 bg-white px-1.5 py-0.5 font-mono text-[9px] text-orange-900">2</kbd></span>
              <span class="block text-[11px] font-semibold text-orange-900/85">Abre a etapa 3 com dados de entrega e repasse.</span>
            </span>
          </label>
        </div>
      </div>

      <div class="pdv-wiz-block pdv-wiz-block--slate">
        <div class="pdv-wiz-block-head">
          <span class="pdv-wiz-head-icon pdv-wiz-head-icon--note" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>
          </span>
          <h3 class="pdv-wiz-block-title pdv-wiz-block-title--slate">Observação da venda</h3>
        </div>
        <textarea id="pdv-venda-observacao" rows="5" class="pdv-input mt-2 min-h-[7rem] resize-y border-slate-200 bg-white" placeholder="Informações rápidas para o fechamento ou para a equipe."></textarea>
      </div>
    </div>

  </div>

</section>
