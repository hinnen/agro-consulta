{# Electron: agroShell.openExternal → shell.openExternal. Browser: window.open. Intercepta window.open para wa.me / Maps. #}
<style id="agro-tabs-strip-styles">
  #agro-system-tabs-indicator {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2147483640;
    pointer-events: none;
    font-family: Inter, system-ui, sans-serif;
    padding: 0 8px calc(10px + env(safe-area-inset-bottom, 0));
  }
  #agro-system-tabs-indicator .agro-tabs-strip-inner {
    pointer-events: auto;
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 8px 12px;
    border-radius: 14px 14px 0 0;
    border: 2px solid #0f766e;
    border-bottom: none;
    background: rgba(236, 253, 245, 0.98);
    box-shadow: 0 -8px 28px rgba(15, 23, 42, 0.15);
    color: #0f172a;
  }
  #agro-system-tabs-indicator .agro-tabs-strip-caption {
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #0f766e;
    width: 100%;
    text-align: center;
    line-height: 1.25;
    margin-bottom: 2px;
  }
  #agro-system-tabs-indicator .agro-tab-slot-grid {
    display: flex;
    flex: 1;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    min-width: 0;
  }
  #agro-system-tabs-indicator .agro-tab-slot {
    flex: 1;
    min-width: 92px;
    max-width: 200px;
    border-radius: 10px;
    border: 2px solid #cbd5e1;
    background: #fff;
    padding: 6px 8px;
    text-align: center;
    line-height: 1.25;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  #agro-system-tabs-indicator .agro-tab-slot.agro-slot-empty {
    border-style: dashed;
    opacity: 0.65;
    background: rgba(248, 250, 252, 0.92);
    color: #64748b;
  }
  #agro-system-tabs-indicator .agro-tab-slot.agro-slot-here {
    border-color: #059669;
    background: rgba(236, 253, 245, 0.95);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.28);
    color: #064e3b;
  }
  #agro-system-tabs-indicator .agro-tab-slot .agro-slot-n {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #64748b;
  }
  #agro-system-tabs-indicator .agro-tab-slot.agro-slot-here .agro-slot-n {
    color: #047857;
  }
  #agro-system-tabs-indicator .agro-tab-slot .agro-slot-role {
    font-size: 12px;
    font-weight: 800;
    margin-top: 2px;
  }
  #agro-system-tabs-indicator .agro-tab-slot .agro-slot-pin {
    font-size: 10px;
    font-weight: 900;
    margin-top: 4px;
    color: #047857;
  }
  @media print {
    #agro-system-tabs-indicator {
      display: none !important;
    }
  }
</style>
<script>
(function () {
  if (window.__agroOpenExternalInit) return;
  window.__agroOpenExternalInit = true;

  /** Referência real — o patch de window.open abaixo não pode ser chamado daqui (wa.me/Maps viraria recursão infinita no browser). */
  var origOpen = window.open;

  function openViaShellOrBrowser(u) {
    if (!u) return;
    var s = String(u).trim();
    if (!s) return;
    if (!/^https?:\/\//i.test(s) && !/^whatsapp:/i.test(s)) return;
    try {
      if (window.agroShell && typeof window.agroShell.openExternal === 'function') {
        var pr = window.agroShell.openExternal(s);
        if (pr && typeof pr.then === 'function') {
          pr.catch(function () {});
        }
        return;
      }
    } catch (e) {}
    try {
      origOpen.call(window, s, '_blank', 'noopener,noreferrer');
    } catch (e2) {}
  }

  window.agroAbrirUrlExterna = openViaShellOrBrowser;

  function isHandoffUrl(s) {
    if (!s || typeof s !== 'string') return false;
    s = s.trim();
    if (/^whatsapp:/i.test(s)) return true;
    if (!/^https?:\/\//i.test(s)) return false;
    try {
      var a = document.createElement('a');
      a.href = s;
      var h = (a.hostname || '').toLowerCase();
      if (h === 'wa.me' || h === 'www.wa.me') return true;
      if (h === 'api.whatsapp.com' || h.indexOf('whatsapp.com') >= 0) return true;
      if (h.indexOf('google.') === 0 && (a.pathname || '').indexOf('/maps') >= 0) return true;
      if (h === 'maps.google.com') return true;
      if (h === 'goo.gl' || h.indexOf('goo.gl') >= 0) return true;
      if (h.indexOf('waze.com') >= 0) return true;
    } catch (e) {}
    return false;
  }

  window.open = function (url, name, features) {
    if (typeof url === 'string' && isHandoffUrl(url)) {
      openViaShellOrBrowser(url.trim());
      return null;
    }
    return origOpen.apply(this, arguments);
  };
})();
</script>

<script>
(function () {
  if (window.__agroTabLimitInit) return;
  window.__agroTabLimitInit = true;
  if (window.top !== window.self) return;

  var REG_KEY = 'agro_tabs_registry_v1';
  var TAB_KEY = 'agro_tab_id_v1';
  var MAX_TABS = 3;
  var STALE_MS = 65000;
  var HEARTBEAT_MS = 10000;
  var aliveTimer = null;
  var blocked = false;
  var stripRoot = null;

  function nowMs() {
    return Date.now();
  }

  function detectRole() {
    var p = String((window.location && window.location.pathname) || '').toLowerCase();
    if (!p) return 'extra';
    if (p === '/' || p.indexOf('/pdv') === 0 || p.indexOf('consulta_produtos') >= 0) return 'pdv';
    return 'extra';
  }

  function getTabId() {
    try {
      var cur = sessionStorage.getItem(TAB_KEY);
      if (cur) return cur;
      var id = 'tab_' + Math.random().toString(36).slice(2, 10) + '_' + nowMs().toString(36);
      sessionStorage.setItem(TAB_KEY, id);
      return id;
    } catch (e) {
      return 'tab_fallback_' + nowMs().toString(36);
    }
  }

  function readReg() {
    try {
      var raw = localStorage.getItem(REG_KEY);
      if (!raw) return { tabs: [] };
      var obj = JSON.parse(raw);
      if (!obj || !Array.isArray(obj.tabs)) return { tabs: [] };
      return obj;
    } catch (e) {
      return { tabs: [] };
    }
  }

  function writeReg(reg) {
    try {
      localStorage.setItem(REG_KEY, JSON.stringify(reg || { tabs: [] }));
    } catch (e) {}
  }

  function cleanupAndUpsert(reg, tabId, role) {
    var ts = nowMs();
    var tabs = (reg && Array.isArray(reg.tabs) ? reg.tabs : []).filter(function (t) {
      return t && t.id && t.lastSeen && (ts - Number(t.lastSeen) <= STALE_MS);
    });
    var found = false;
    for (var i = 0; i < tabs.length; i++) {
      if (tabs[i].id === tabId) {
        tabs[i].lastSeen = ts;
        tabs[i].role = role;
        tabs[i].path = String((window.location && window.location.pathname) || '');
        found = true;
        break;
      }
    }
    if (!found) {
      tabs.push({
        id: tabId,
        role: role,
        path: String((window.location && window.location.pathname) || ''),
        lastSeen: ts,
      });
    }
    return { tabs: tabs };
  }

  function removeTab(reg, tabId) {
    var tabs = (reg && Array.isArray(reg.tabs) ? reg.tabs : []).filter(function (t) {
      return t && t.id !== tabId;
    });
    return { tabs: tabs };
  }

  function pruneStaleTabList(tabs) {
    var ts = nowMs();
    return (tabs || []).filter(function (t) {
      return t && t.id && t.lastSeen && ts - Number(t.lastSeen) <= STALE_MS;
    });
  }

  function orderedTabsForStrip(tabs) {
    var list = pruneStaleTabList(tabs);
    var pdv = list.filter(function (t) {
      return t.role === 'pdv';
    });
    var ext = list.filter(function (t) {
      return t.role !== 'pdv';
    });
    ext.sort(function (a, b) {
      return String(a.id).localeCompare(String(b.id));
    });
    return pdv.concat(ext).slice(0, MAX_TABS);
  }

  function ensureTabsStripDom() {
    if (stripRoot && document.body.contains(stripRoot)) return stripRoot;
    stripRoot = document.getElementById('agro-system-tabs-indicator');
    if (stripRoot) return stripRoot;
    stripRoot = document.createElement('div');
    stripRoot.id = 'agro-system-tabs-indicator';
    stripRoot.setAttribute('aria-label', 'Indicador de abas do sistema Agro');
    stripRoot.innerHTML =
      '<div class="agro-tabs-strip-inner">' +
        '<div class="agro-tabs-strip-caption" id="agro-tabs-strip-caption"></div>' +
        '<div class="agro-tab-slot-grid" id="agro-tab-slot-grid" role="list"></div>' +
      '</div>';
    document.body.appendChild(stripRoot);
    return stripRoot;
  }

  function updateTabsStrip(tabId, role) {
    if (blocked) return;
    if (!document.body) return;
    try {
      var reg = readReg();
      var merged = orderedTabsForStrip(reg.tabs);
      var cap = merged.length;
      var here = tabId;

      ensureTabsStripDom();
      var caption = document.getElementById('agro-tabs-strip-caption');
      var grid = document.getElementById('agro-tab-slot-grid');
      if (!caption || !grid) return;

      caption.textContent =
        cap +
        '/3 aba' +
        (cap === 1 ? '' : 's') +
        ' em uso no navegador — o quadro verde é esta janela';

      var html = '';
      for (var i = 0; i < MAX_TABS; i++) {
        var t = merged[i];
        var isHere = t && t.id === here;
        var slotClass = 'agro-tab-slot';
        if (!t) {
          slotClass += ' agro-slot-empty';
        } else if (isHere) {
          slotClass += ' agro-slot-here';
        }
        var roleLine = 'Livre';
        if (t) {
          roleLine = t.role === 'pdv' ? 'PDV' : 'Outra tela';
        }
        var pin = isHere ? '<div class="agro-slot-pin">← Você está aqui</div>' : '';
        var pathHint = '';
        if (t && t.path) {
          var shortp = String(t.path);
          if (shortp.length > 22) shortp = shortp.slice(0, 20) + '…';
          pathHint = '<div class="agro-slot-path" style="font-size:10px;font-weight:700;color:#64748b;margin-top:3px;word-break:break-all">' + shortp + '</div>';
        }
        html +=
          '<div class="' +
          slotClass +
          '" role="listitem" title="' +
          (t ? roleLine + (t.path ? ' — ' + t.path : '') : 'Vaga livre para nova aba') +
          '">' +
          '<div class="agro-slot-n">Aba ' +
          (i + 1) +
          '</div>' +
          '<div class="agro-slot-role">' +
          roleLine +
          '</div>' +
          pathHint +
          pin +
          '</div>';
      }
      grid.innerHTML = html;
    } catch (e) {}
  }

  function scheduleStripMount(tabId, role) {
    function paint() {
      updateTabsStrip(tabId, role);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', paint, { once: true });
    } else {
      paint();
    }
  }

  function showBlockedOverlay(reasonText) {
    if (document.getElementById('agro-tab-limit-overlay')) return;
    var root = document.createElement('div');
    root.id = 'agro-tab-limit-overlay';
    root.style.cssText = [
      'position:fixed',
      'inset:0',
      'z-index:2147483647',
      'background:rgba(2,6,23,0.92)',
      'display:flex',
      'align-items:center',
      'justify-content:center',
      'padding:16px',
      'font-family:Inter,system-ui,sans-serif',
    ].join(';');
    root.innerHTML =
      '<div style="width:min(560px,96vw);background:#fff;border:2px solid #f59e0b;border-radius:16px;padding:16px 16px 14px;box-shadow:0 20px 50px rgba(0,0,0,.35)">' +
        '<div style="font-size:12px;font-weight:900;color:#b45309;text-transform:uppercase;letter-spacing:.04em">Limite de abas</div>' +
        '<h2 style="margin:4px 0 8px;font-size:22px;line-height:1.1;font-weight:900;color:#0f172a">Esta aba foi bloqueada</h2>' +
        '<p style="margin:0 0 8px;font-size:15px;line-height:1.4;color:#334155;font-weight:700">' + reasonText + '</p>' +
        '<p style="margin:0 0 12px;font-size:14px;line-height:1.4;color:#475569">Regras: 1 aba do PDV + até 2 abas extras (máximo 3 no total).</p>' +
        '<button type="button" id="agro-tab-limit-close" style="width:100%;min-height:44px;border-radius:12px;border:2px solid #0f172a;background:#0f172a;color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;cursor:pointer">Fechar esta aba</button>' +
      '</div>';
    document.body.appendChild(root);
    var b = document.getElementById('agro-tab-limit-close');
    if (b) {
      b.onclick = function () {
        try { window.close(); } catch (e) {}
        try { window.location.href = 'about:blank'; } catch (e2) {}
      };
    }
  }

  function evaluateAndRegister() {
    var tabId = getTabId();
    var role = detectRole();
    var reg = cleanupAndUpsert(readReg(), tabId, role);
    writeReg(reg);
    var total = reg.tabs.length;
    var pdvCount = reg.tabs.filter(function (t) { return t.role === 'pdv'; }).length;
    if (total <= MAX_TABS && pdvCount <= 1) return { ok: true, tabId: tabId, role: role };
    var regWithoutMe = removeTab(reg, tabId);
    writeReg(regWithoutMe);
    return {
      ok: false,
      tabId: tabId,
      role: role,
      reason: total > MAX_TABS
        ? 'Já existem 3 abas do sistema abertas.'
        : 'Já existe uma aba de PDV aberta. Mantenha apenas uma aba de PDV.',
    };
  }

  function heartbeat(tabId, role) {
    if (blocked) return;
    var reg = cleanupAndUpsert(readReg(), tabId, role);
    writeReg(reg);
    updateTabsStrip(tabId, role);
  }

  function release(tabId) {
    if (!tabId) return;
    var reg = removeTab(cleanupAndUpsert(readReg(), tabId, detectRole()), tabId);
    writeReg(reg);
  }

  var check = evaluateAndRegister();
  if (!check.ok) {
    blocked = true;
    showBlockedOverlay(check.reason);
    return;
  }

  scheduleStripMount(check.tabId, check.role);

  aliveTimer = setInterval(function () {
    heartbeat(check.tabId, check.role);
  }, HEARTBEAT_MS);

  window.addEventListener('beforeunload', function () {
    if (aliveTimer) clearInterval(aliveTimer);
    release(check.tabId);
  });
  window.addEventListener('pagehide', function () {
    if (aliveTimer) clearInterval(aliveTimer);
    release(check.tabId);
  });
  window.addEventListener('storage', function (ev) {
    if (ev && ev.key === REG_KEY) {
      heartbeat(check.tabId, check.role);
    }
  });
})();
</script>
