<script>
(function () {
  if (window.__agroOpenExternalInit) return;
  window.__agroOpenExternalInit = true;

  /** Referência real — o patch de window.open abaixo não pode ser chamado daqui (wa.me/Maps viraria recursão infinita no browser). */
  var origOpen = window.open;

  function openViaShellOrBrowser(u) {
    if (!u) return;
    var s = String(u).trim();
    if (!s) return;
    if (!/^https?:\/\//i.test(s) && !/^whatsapp:/i.test(s)) return;
    try {
      if (window.agroShell && typeof window.agroShell.openExternal === 'function') {
        var pr = window.agroShell.openExternal(s);
        if (pr && typeof pr.then === 'function') {
          pr.catch(function () {});
        }
        return;
      }
    } catch (e) {}
    try {
      origOpen.call(window, s, '_blank', 'noopener,noreferrer');
    } catch (e2) {}
  }

  window.agroAbrirUrlExterna = openViaShellOrBrowser;

  function isHandoffUrl(s) {
    if (!s || typeof s !== 'string') return false;
    s = s.trim();
    if (/^whatsapp:/i.test(s)) return true;
    if (!/^https?:\/\//i.test(s)) return false;
    try {
      var a = document.createElement('a');
      a.href = s;
      var h = (a.hostname || '').toLowerCase();
      if (h === 'wa.me' || h === 'www.wa.me') return true;
      if (h === 'api.whatsapp.com' || h.indexOf('whatsapp.com') >= 0) return true;
      if (h.indexOf('google.') === 0 && (a.pathname || '').indexOf('/maps') >= 0) return true;
      if (h === 'maps.google.com') return true;
      if (h === 'goo.gl' || h.indexOf('goo.gl') >= 0) return true;
      if (h.indexOf('waze.com') >= 0) return true;
    } catch (e) {}
    return false;
  }

  window.open = function (url, name, features) {
    if (typeof url === 'string' && isHandoffUrl(url)) {
      openViaShellOrBrowser(url.trim());
      return null;
    }
    return origOpen.apply(this, arguments);
  };
})();
</script>

<script>
(function () {
  /**
   * IMPORTANTE: deve existir SEMPRE, antes de if (__agroTabLimitInit) return.
   * Se _agro_consulta_ui for incluído 2x na página, o 2.º bloco saía cedo e apagava esta função — o clique deixava de fazer nada.
   * onclick inline nas bolinhas chama isto diretamente.
   */
  window.__agroConsultaTabDotToggle = function (ev, dotEl) {
    try {
      if (ev && ev.preventDefault) ev.preventDefault();
      if (ev && ev.stopPropagation) ev.stopPropagation();
      var grid = document.getElementById('agro-tab-slot-grid');
      if (!grid || !dotEl) return;
      var wrap =
        dotEl.closest && dotEl.closest('.agro-tab-slot-wrap')
          ? dotEl.closest('.agro-tab-slot-wrap')
          : null;
      if (!wrap || !grid.contains(wrap)) return;
      if (dotEl.classList) {
        dotEl.classList.add('agro-dot-tap-flash');
        setTimeout(function () {
          try {
            dotEl.classList && dotEl.classList.remove('agro-dot-tap-flash');
          } catch (_) {}
        }, 380);
      }
      var wasOpen = wrap.classList.contains('agro-panel-open');
      grid.querySelectorAll('.agro-tab-slot-wrap').forEach(function (w) {
        w.classList.remove('agro-panel-open');
        w.setAttribute('aria-expanded', 'false');
        var b0 = w.querySelector('button.agro-tab-dot');
        if (b0) b0.setAttribute('aria-expanded', 'false');
      });
      if (!wasOpen) {
        wrap.classList.add('agro-panel-open');
        wrap.setAttribute('aria-expanded', 'true');
        var b1 = wrap.querySelector('button.agro-tab-dot');
        if (b1) b1.setAttribute('aria-expanded', 'true');
      }
    } catch (e) {}
  };

  /**
   * No Chrome “instalado” (site como aplicativo sem barra de abas), Ctrl+T costuma não existir —
   * este helper abre nova janela com o mesmo URL (conta como outra sessão no mesmo limite).
   */
  window.__agroOpenAnotherAgroWindow = function (ev) {
    try {
      if (ev && typeof ev.preventDefault === 'function') ev.preventDefault();
      if (ev && typeof ev.stopPropagation === 'function') ev.stopPropagation();
      var href = String((window.location && window.location.href) || '').split('#')[0] || '';
      var u = href || '/';
      window.open(u, '_blank', 'noopener,noreferrer');
    } catch (e2) {}
  };

  if (window.__agroTabLimitInit) return;
  window.__agroTabLimitInit = true;

  if (window.top !== window.self) return;

  var REG_KEY = 'agro_tabs_registry_v1';
  var TAB_KEY = 'agro_tab_id_v1';
  var MAX_TABS = 3;
  var STALE_MS = 65000;
  var HEARTBEAT_MS = 10000;
  var aliveTimer = null;
  var blocked = false;
  var stripRoot = null;

  function nowMs() {
    return Date.now();
  }

  function roleFromPath(pathStr) {
    var p = String(pathStr || '').toLowerCase();
    if (!p) return 'extra';
    if (p === '/' || p.indexOf('/pdv') === 0 || p.indexOf('consulta_produtos') >= 0) return 'pdv';
    return 'extra';
  }

  function detectRole() {
    return roleFromPath((window.location && window.location.pathname) || '');
  }

  function getTabId() {
    try {
      var cur = sessionStorage.getItem(TAB_KEY);
      if (cur) return cur;
      var id = 'tab_' + Math.random().toString(36).slice(2, 10) + '_' + nowMs().toString(36);
      sessionStorage.setItem(TAB_KEY, id);
      return id;
    } catch (e) {
      return 'tab_fallback_' + nowMs().toString(36);
    }
  }

  function readReg() {
    try {
      var raw = localStorage.getItem(REG_KEY);
      if (!raw) return { tabs: [] };
      var obj = JSON.parse(raw);
      if (!obj || !Array.isArray(obj.tabs)) return { tabs: [] };
      return obj;
    } catch (e) {
      return { tabs: [] };
    }
  }

  function writeReg(reg) {
    try {
      localStorage.setItem(REG_KEY, JSON.stringify(reg || { tabs: [] }));
    } catch (e) {}
  }

  function cleanupAndUpsert(reg, tabId, role) {
    var ts = nowMs();
    var tabs = (reg && Array.isArray(reg.tabs) ? reg.tabs : []).filter(function (t) {
      return t && t.id && t.lastSeen && (ts - Number(t.lastSeen) <= STALE_MS);
    });
    var found = false;
    for (var i = 0; i < tabs.length; i++) {
      if (tabs[i].id === tabId) {
        tabs[i].lastSeen = ts;
        tabs[i].role = role;
        tabs[i].path = String((window.location && window.location.pathname) || '');
        found = true;
        break;
      }
    }
    if (!found) {
      tabs.push({
        id: tabId,
        role: role,
        path: String((window.location && window.location.pathname) || ''),
        lastSeen: ts,
      });
    }
    return { tabs: tabs };
  }

  function removeTab(reg, tabId) {
    var tabs = (reg && Array.isArray(reg.tabs) ? reg.tabs : []).filter(function (t) {
      return t && t.id !== tabId;
    });
    return { tabs: tabs };
  }

  function pruneStaleTabList(tabs) {
    var ts = nowMs();
    return (tabs || []).filter(function (t) {
      return t && t.id && t.lastSeen && ts - Number(t.lastSeen) <= STALE_MS;
    });
  }

  /** Várias janelas no mesmo caminho PDV antes bloqueavam esta aba; mantém só 1 entrada como PDV (id menor), as outras ficam como “extra”. */
  function reconcileMultiPdv(reg) {
    var tabs = pruneStaleTabList(reg && Array.isArray(reg.tabs) ? reg.tabs : []);
    var pdvIdx = [];
    var i;
    for (i = 0; i < tabs.length; i++) {
      if (!tabs[i]) continue;
      if (roleFromPath(String(tabs[i].path || '')) === 'pdv') pdvIdx.push(i);
    }
    if (pdvIdx.length <= 1) return { tabs: tabs };
    pdvIdx.sort(function (a, b) {
      return String(tabs[a].id).localeCompare(String(tabs[b].id));
    });
    for (var k = 1; k < pdvIdx.length; k++) {
      var j = pdvIdx[k];
      tabs[j] = Object.assign({}, tabs[j], { role: 'extra' });
    }
    return { tabs: tabs };
  }

  function orderedTabsForStrip(tabs) {
    var list = pruneStaleTabList(tabs);
    var pdv = list.filter(function (t) {
      return t.role === 'pdv';
    });
    var ext = list.filter(function (t) {
      return t.role !== 'pdv';
    });
    ext.sort(function (a, b) {
      return String(a.id).localeCompare(String(b.id));
    });
    return pdv.concat(ext).slice(0, MAX_TABS);
  }

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function ensureNovaJanelaButtonInStrip(inner) {
    if (!inner || inner.querySelector('.agro-tabs-new-win')) return;
    try {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'agro-tabs-new-win';
      b.textContent = 'Nova janela';
      b.setAttribute(
        'aria-label',
        'Abrir nova janela do Agro (atalho novo separador costuma não existir quando o site abre como aplicativo)'
      );
      b.title =
        'Abre nova janela do mesmo endereço. No Chrome instalado como app, Ctrl+T normalmente não cria novo separador.';
      b.setAttribute(
        'onclick',
        'try{window.__agroOpenAnotherAgroWindow(event)}catch(_){};return false;'
      );
      inner.insertBefore(b, inner.firstChild);
    } catch (_) {}
  }

  function ensureTabsStripDom() {
    if (stripRoot && document.body.contains(stripRoot)) {
      var innerEarly = stripRoot.querySelector('.agro-tabs-strip-inner');
      ensureNovaJanelaButtonInStrip(innerEarly);
      return stripRoot;
    }
    stripRoot = document.getElementById('agro-system-tabs-indicator');
    if (stripRoot) {
      ensureNovaJanelaButtonInStrip(stripRoot.querySelector('.agro-tabs-strip-inner'));
      return stripRoot;
    }
    stripRoot = document.createElement('div');
    stripRoot.id = 'agro-system-tabs-indicator';
    stripRoot.setAttribute('aria-label', 'Abas do sistema (no máximo três)');
    stripRoot.innerHTML =
      '<div class="agro-tabs-strip-inner">' +
        '<button type="button" class="agro-tabs-new-win"' +
          ' onclick="try{window.__agroOpenAnotherAgroWindow(event)}catch(_){};return false;"' +
          ' title="Abre nova janela do mesmo endereço. No Chrome instalado como app, Ctrl+T não cria novo separador." ' +
          'aria-label="Abrir nova janela do Agro">' +
          'Nova janela</button>' +
        '<div class="agro-tab-slot-grid" id="agro-tab-slot-grid" role="list"></div>' +
      '</div>';
    document.body.appendChild(stripRoot);
    return stripRoot;
  }

  function agroCloseAllTabPanels() {
    var grid = document.getElementById('agro-tab-slot-grid');
    if (!grid) return;
    grid.querySelectorAll('.agro-tab-slot-wrap').forEach(function (w) {
      w.classList.remove('agro-panel-open');
      w.setAttribute('aria-expanded', 'false');
      var bd = w.querySelector('button.agro-tab-dot');
      if (bd) bd.setAttribute('aria-expanded', 'false');
    });
  }

  function agroTabStripOnDocClick(ev) {
    var ind = document.getElementById('agro-system-tabs-indicator');
    if (!ind) return;
    if (ind.contains(ev.target)) return;
    agroCloseAllTabPanels();
  }

  function agroTabStripOnKey(ev) {
    if (ev.key === 'Escape') agroCloseAllTabPanels();
  }

  function bindTabDotsKeyOnly(grid) {
    if (!grid) return;
    grid.querySelectorAll('button.agro-tab-dot').forEach(function (btn) {
      btn.addEventListener(
        'keydown',
        function (ev) {
          if (ev.key === 'Enter' || ev.key === ' ' || ev.which === 32) {
            ev.preventDefault();
            if (typeof window.__agroConsultaTabDotToggle === 'function')
              window.__agroConsultaTabDotToggle(ev, btn);
          }
        },
        false
      );
    });
  }

  function initAgroTabStripPanelControlsOnce() {
    if (initAgroTabStripPanelControlsOnce.did) return;
    initAgroTabStripPanelControlsOnce.did = true;
    document.addEventListener('click', agroTabStripOnDocClick);
    document.addEventListener('keydown', agroTabStripOnKey);
  }

  function updateTabsStrip(tabId, role) {
    if (blocked) return;
    if (!document.body) return;
    try {
      var reg = readReg();
      var merged = orderedTabsForStrip(reg.tabs);
      var here = tabId;

      ensureTabsStripDom();
      try {
        var indTop = document.getElementById('agro-system-tabs-indicator');
        if (indTop && document.body && document.body.lastElementChild !== indTop)
          document.body.appendChild(indTop);
      } catch (_) {}
      var grid = document.getElementById('agro-tab-slot-grid');
      if (!grid) return;

      var keepSlot = null;
      var prevOpen = grid.querySelector('.agro-tab-slot-wrap.agro-panel-open');
      if (prevOpen) keepSlot = prevOpen.getAttribute('data-slot');

      var html = '';
      for (var i = 0; i < MAX_TABS; i++) {
        var t = merged[i];
        var isHere = t && t.id === here;
        var cls = 'agro-tab-dot';
        var alab = 'Vaga ' + (i + 1) + ': livre';
        if (!t) {
          cls += ' agro-dot-empty';
        } else if (isHere) {
          cls += ' agro-dot-here';
          alab = 'Vaga ' + (i + 1) + ': esta janela';
        } else {
          cls += ' agro-dot-remote';
          alab = 'Vaga ' + (i + 1) + ': outra janela aberta';
        }
        var line1 = 'Livre';
        var line2 = '—';
        var hereHtml = '';
        if (t) {
          line1 = t.role === 'pdv' ? 'PDV' : 'Outra tela';
          line2 = (t.path && String(t.path).trim()) || '/';
          if (isHere) hereHtml = '<span class="agro-tab-hover-here">Esta janela</span>';
        }
        html +=
          '<div class="agro-tab-slot-wrap" role="listitem" data-slot="' +
          i +
          '" aria-expanded="false">' +
          '<button type="button" class="' +
          cls +
          '" data-i="' +
          i +
          '" aria-label="' +
          escHtml(alab) +
          '" title="' +
          escHtml(alab) +
          '" aria-expanded="false" tabindex="0" onclick="try{window.__agroConsultaTabDotToggle(event,this)}catch(e){}return false;"></button>' +
          '<div class="agro-tab-hover-panel">' +
          '<div class="agro-tab-hover-panel-inner">' +
          '<div class="agro-tab-hover-line1">' +
          escHtml(line1) +
          '</div>' +
          '<div class="agro-tab-hover-line2">' +
          escHtml(line2) +
          '</div>' +
          hereHtml +
          '</div>' +
          '</div>' +
          '</div>';
      }
      grid.innerHTML = html;
      if (keepSlot !== null && keepSlot !== '') {
        var reopened = grid.querySelector(
          '.agro-tab-slot-wrap[data-slot="' + keepSlot + '"]'
        );
        if (reopened) {
          reopened.classList.add('agro-panel-open');
          reopened.setAttribute('aria-expanded', 'true');
        }
      }
      grid.querySelectorAll('.agro-tab-slot-wrap').forEach(function (w) {
        var ao = w.classList.contains('agro-panel-open') ? 'true' : 'false';
        w.setAttribute('aria-expanded', ao);
        var bt = w.querySelector('button.agro-tab-dot');
        if (bt) bt.setAttribute('aria-expanded', ao);
      });
      bindTabDotsKeyOnly(grid);
      initAgroTabStripPanelControlsOnce();
    } catch (e) {}
  }

  function scheduleStripMount(tabId, role) {
    function paint() {
      updateTabsStrip(tabId, role);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', paint, { once: true });
    } else {
      paint();
    }
  }

  function showBlockedOverlay(reasonText) {
    if (document.getElementById('agro-tab-limit-overlay')) return;
    var root = document.createElement('div');
    root.id = 'agro-tab-limit-overlay';
    root.style.cssText = [
      'position:fixed',
      'inset:0',
      'z-index:2147483647',
      'background:rgba(2,6,23,0.92)',
      'display:flex',
      'align-items:center',
      'justify-content:center',
      'padding:16px',
      'font-family:Inter,system-ui,sans-serif',
    ].join(';');
    root.innerHTML =
      '<div style="width:min(560px,96vw);background:#fff;border:2px solid #f59e0b;border-radius:16px;padding:16px 16px 14px;box-shadow:0 20px 50px rgba(0,0,0,.35)">' +
        '<div style="font-size:12px;font-weight:900;color:#b45309;text-transform:uppercase;letter-spacing:.04em">Limite de abas</div>' +
        '<h2 style="margin:4px 0 8px;font-size:22px;line-height:1.1;font-weight:900;color:#0f172a">Esta aba foi bloqueada</h2>' +
        '<p style="margin:0 0 8px;font-size:15px;line-height:1.4;color:#334155;font-weight:700">' + reasonText + '</p>' +
        '<p style="margin:0 0 12px;font-size:14px;line-height:1.4;color:#475569">Só aparece quando já existem 3 abas. Se duplicar o PDV, a mais fica marcada como outra sessão até ir para outro endereço.</p>' +
        '<button type="button" id="agro-tab-limit-close" style="width:100%;min-height:44px;border-radius:12px;border:2px solid #0f172a;background:#0f172a;color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;cursor:pointer">Fechar esta aba</button>' +
      '</div>';
    document.body.appendChild(root);
    var b = document.getElementById('agro-tab-limit-close');
    if (b) {
      b.onclick = function () {
        try { window.close(); } catch (e) {}
        try { window.location.href = 'about:blank'; } catch (e2) {}
      };
    }
  }

  function evaluateAndRegister() {
    var tabId = getTabId();
    var role = detectRole();
    var reg = readReg();
    reg = cleanupAndUpsert(reg, tabId, role);
    reg = reconcileMultiPdv(reg);
    writeReg(reg);
    var total = reg.tabs.length;
    if (total <= MAX_TABS) return { ok: true, tabId: tabId, role: role };
    var regWithoutMe = removeTab(reg, tabId);
    writeReg(regWithoutMe);
    return {
      ok: false,
      tabId: tabId,
      role: role,
      reason: 'Já existem 3 abas do sistema abertas.',
    };
  }

  function heartbeat(tabId) {
    if (blocked) return;
    var role = detectRole();
    var reg = readReg();
    reg = cleanupAndUpsert(reg, tabId, role);
    reg = reconcileMultiPdv(reg);
    writeReg(reg);
    updateTabsStrip(tabId, role);
  }

  function release(tabId) {
    if (!tabId) return;
    var reg = removeTab(cleanupAndUpsert(readReg(), tabId, detectRole()), tabId);
    writeReg(reg);
  }

  var check = evaluateAndRegister();
  if (!check.ok) {
    blocked = true;
    showBlockedOverlay(check.reason);
    return;
  }

  initAgroTabStripPanelControlsOnce();
  scheduleStripMount(check.tabId, check.role);

  function heartbeatPing() {
    heartbeat(check.tabId);
  }

  heartbeatPing();
  aliveTimer = setInterval(heartbeatPing, HEARTBEAT_MS);

  window.addEventListener('popstate', heartbeatPing);
  window.addEventListener('hashchange', heartbeatPing);

  window.addEventListener('beforeunload', function () {
    if (aliveTimer) clearInterval(aliveTimer);
    release(check.tabId);
  });
  window.addEventListener('pagehide', function () {
    if (aliveTimer) clearInterval(aliveTimer);
    release(check.tabId);
  });
  window.addEventListener('storage', function (ev) {
    if (ev && ev.key === REG_KEY) heartbeatPing();
  });
})();
</script>
