<script>
(function () {
  if (window.__agroOpenExternalInit) return;
  window.__agroOpenExternalInit = true;

  /** Referência real — o patch de window.open abaixo não pode ser chamado daqui (wa.me/Maps viraria recursão infinita no browser). */
  var origOpen = window.open;

  function openViaShellOrBrowser(u) {
    if (!u) return;
    var s = String(u).trim();
    if (!s) return;
    if (!/^https?:\/\//i.test(s) && !/^whatsapp:/i.test(s)) return;
    try {
      if (window.agroShell && typeof window.agroShell.openExternal === 'function') {
        var pr = window.agroShell.openExternal(s);
        if (pr && typeof pr.then === 'function') {
          pr.catch(function () {});
        }
        return;
      }
    } catch (e) {}
    try {
      origOpen.call(window, s, '_blank', 'noopener,noreferrer');
    } catch (e2) {}
  }

  window.agroAbrirUrlExterna = openViaShellOrBrowser;

  function isHandoffUrl(s) {
    if (!s || typeof s !== 'string') return false;
    s = s.trim();
    if (/^whatsapp:/i.test(s)) return true;
    if (!/^https?:\/\//i.test(s)) return false;
    try {
      var a = document.createElement('a');
      a.href = s;
      var h = (a.hostname || '').toLowerCase();
      if (h === 'wa.me' || h === 'www.wa.me') return true;
      if (h === 'api.whatsapp.com' || h.indexOf('whatsapp.com') >= 0) return true;
      if (h.indexOf('google.') === 0 && (a.pathname || '').indexOf('/maps') >= 0) return true;
      if (h === 'maps.google.com') return true;
      if (h === 'goo.gl' || h.indexOf('goo.gl') >= 0) return true;
      if (h.indexOf('waze.com') >= 0) return true;
    } catch (e) {}
    return false;
  }

  window.open = function (url, name, features) {
    if (typeof url === 'string' && isHandoffUrl(url)) {
      openViaShellOrBrowser(url.trim());
      return null;
    }
    return origOpen.apply(this, arguments);
  };
})();
</script>

<script>
(function () {
  /**
   * IMPORTANTE: __agroOpenAnotherAgroWindow deve existir SEMPRE antes de if (__agroTabLimitInit) return —
   * se _agro_consulta_ui for incluído 2×, o 2.º bloco saía cedo sem isto.
   * Preferir abas internas (barra lateral) quando existir; senão fallback para nova janela do browser.
   */
  window.__agroOpenAnotherAgroWindow = function (ev) {
    try {
      if (ev && typeof ev.preventDefault === 'function') ev.preventDefault();
      if (ev && typeof ev.stopPropagation === 'function') ev.stopPropagation();
      if (typeof window.__agroShowPresetLauncher === 'function') {
        window.__agroShowPresetLauncher();
        return;
      }
      var href = String((window.location && window.location.href) || '').split('#')[0] || '';
      var u = href || '/';
      if (typeof window.__agroInAppAddTab === 'function') {
        window.__agroInAppAddTab(u);
        return;
      }
      window.open(u, '_blank', 'noopener,noreferrer');
    } catch (e2) {}
  };

  if (window.__agroTabLimitInit) return;
  window.__agroTabLimitInit = true;

  if (window.top !== window.self) return;

  var REG_KEY = 'agro_tabs_registry_v1';
  var TAB_KEY = 'agro_tab_id_v1';
  var MAX_TABS = 3;
  var STALE_MS = 65000;
  var HEARTBEAT_MS = 10000;
  var aliveTimer = null;
  var blocked = false;

  function nowMs() {
    return Date.now();
  }

  function roleFromPath(pathStr) {
    var p = String(pathStr || '').toLowerCase();
    if (!p) return 'extra';
    if (p === '/' || p.indexOf('/pdv') === 0 || p.indexOf('consulta_produtos') >= 0) return 'pdv';
    return 'extra';
  }

  function detectRole() {
    return roleFromPath((window.location && window.location.pathname) || '');
  }

  function getTabId() {
    try {
      var cur = sessionStorage.getItem(TAB_KEY);
      if (cur) return cur;
      var id = 'tab_' + Math.random().toString(36).slice(2, 10) + '_' + nowMs().toString(36);
      sessionStorage.setItem(TAB_KEY, id);
      return id;
    } catch (e) {
      return 'tab_fallback_' + nowMs().toString(36);
    }
  }

  function readReg() {
    try {
      var raw = localStorage.getItem(REG_KEY);
      if (!raw) return { tabs: [] };
      var obj = JSON.parse(raw);
      if (!obj || !Array.isArray(obj.tabs)) return { tabs: [] };
      return obj;
    } catch (e) {
      return { tabs: [] };
    }
  }

  function writeReg(reg) {
    try {
      localStorage.setItem(REG_KEY, JSON.stringify(reg || { tabs: [] }));
    } catch (e) {}
  }

  function cleanupAndUpsert(reg, tabId, role) {
    var ts = nowMs();
    var tabs = (reg && Array.isArray(reg.tabs) ? reg.tabs : []).filter(function (t) {
      return t && t.id && t.lastSeen && (ts - Number(t.lastSeen) <= STALE_MS);
    });
    var found = false;
    for (var i = 0; i < tabs.length; i++) {
      if (tabs[i].id === tabId) {
        tabs[i].lastSeen = ts;
        tabs[i].role = role;
        tabs[i].path = String((window.location && window.location.pathname) || '');
        found = true;
        break;
      }
    }
    if (!found) {
      tabs.push({
        id: tabId,
        role: role,
        path: String((window.location && window.location.pathname) || ''),
        lastSeen: ts,
      });
    }
    return { tabs: tabs };
  }

  function removeTab(reg, tabId) {
    var tabs = (reg && Array.isArray(reg.tabs) ? reg.tabs : []).filter(function (t) {
      return t && t.id !== tabId;
    });
    return { tabs: tabs };
  }

  function pruneStaleTabList(tabs) {
    var ts = nowMs();
    return (tabs || []).filter(function (t) {
      return t && t.id && t.lastSeen && ts - Number(t.lastSeen) <= STALE_MS;
    });
  }

  /** Várias janelas no mesmo caminho PDV antes bloqueavam esta aba; mantém só 1 entrada como PDV (id menor), as outras ficam como “extra”. */
  function reconcileMultiPdv(reg) {
    var tabs = pruneStaleTabList(reg && Array.isArray(reg.tabs) ? reg.tabs : []);
    var pdvIdx = [];
    var i;
    for (i = 0; i < tabs.length; i++) {
      if (!tabs[i]) continue;
      if (roleFromPath(String(tabs[i].path || '')) === 'pdv') pdvIdx.push(i);
    }
    if (pdvIdx.length <= 1) return { tabs: tabs };
    pdvIdx.sort(function (a, b) {
      return String(tabs[a].id).localeCompare(String(tabs[b].id));
    });
    for (var k = 1; k < pdvIdx.length; k++) {
      var j = pdvIdx[k];
      tabs[j] = Object.assign({}, tabs[j], { role: 'extra' });
    }
    return { tabs: tabs };
  }

  function showBlockedOverlay(reasonText) {
    if (document.getElementById('agro-tab-limit-overlay')) return;
    var root = document.createElement('div');
    root.id = 'agro-tab-limit-overlay';
    root.style.cssText = [
      'position:fixed',
      'inset:0',
      'z-index:2147483647',
      'background:rgba(2,6,23,0.92)',
      'display:flex',
      'align-items:center',
      'justify-content:center',
      'padding:16px',
      'font-family:Inter,system-ui,sans-serif',
    ].join(';');
    root.innerHTML =
      '<div style="width:min(560px,96vw);background:#fff;border:2px solid #f59e0b;border-radius:16px;padding:16px 16px 14px;box-shadow:0 20px 50px rgba(0,0,0,.35)">' +
        '<div style="font-size:12px;font-weight:900;color:#b45309;text-transform:uppercase;letter-spacing:.04em">Limite de abas</div>' +
        '<h2 style="margin:4px 0 8px;font-size:22px;line-height:1.1;font-weight:900;color:#0f172a">Esta aba foi bloqueada</h2>' +
        '<p style="margin:0 0 8px;font-size:15px;line-height:1.4;color:#334155;font-weight:700">' + reasonText + '</p>' +
        '<p style="margin:0 0 12px;font-size:14px;line-height:1.4;color:#475569">Só aparece quando já existem 3 abas. Se duplicar o PDV, a mais fica marcada como outra sessão até ir para outro endereço.</p>' +
        '<button type="button" id="agro-tab-limit-close" style="width:100%;min-height:44px;border-radius:12px;border:2px solid #0f172a;background:#0f172a;color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;cursor:pointer">Fechar esta aba</button>' +
      '</div>';
    document.body.appendChild(root);
    var b = document.getElementById('agro-tab-limit-close');
    if (b) {
      b.onclick = function () {
        try { window.close(); } catch (e) {}
        try { window.location.href = 'about:blank'; } catch (e2) {}
      };
    }
  }

  function evaluateAndRegister() {
    var tabId = getTabId();
    var role = detectRole();
    var reg = readReg();
    reg = cleanupAndUpsert(reg, tabId, role);
    reg = reconcileMultiPdv(reg);
    writeReg(reg);
    var total = reg.tabs.length;
    if (total <= MAX_TABS) return { ok: true, tabId: tabId, role: role };
    var regWithoutMe = removeTab(reg, tabId);
    writeReg(regWithoutMe);
    return {
      ok: false,
      tabId: tabId,
      role: role,
      reason: 'Já existem 3 abas do sistema abertas.',
    };
  }

  function heartbeat(tabId) {
    if (blocked) return;
    var role = detectRole();
    var reg = readReg();
    reg = cleanupAndUpsert(reg, tabId, role);
    reg = reconcileMultiPdv(reg);
    writeReg(reg);
  }

  function release(tabId) {
    if (!tabId) return;
    var reg = removeTab(cleanupAndUpsert(readReg(), tabId, detectRole()), tabId);
    writeReg(reg);
  }

  var check = evaluateAndRegister();
  if (!check.ok) {
    blocked = true;
    showBlockedOverlay(check.reason);
    return;
  }

  function heartbeatPing() {
    heartbeat(check.tabId);
  }

  heartbeatPing();
  aliveTimer = setInterval(heartbeatPing, HEARTBEAT_MS);

  window.addEventListener('popstate', heartbeatPing);
  window.addEventListener('hashchange', heartbeatPing);

  window.addEventListener('beforeunload', function () {
    if (aliveTimer) clearInterval(aliveTimer);
    release(check.tabId);
  });
  window.addEventListener('pagehide', function () {
    if (aliveTimer) clearInterval(aliveTimer);
    release(check.tabId);
  });
  window.addEventListener('storage', function (ev) {
    if (ev && ev.key === REG_KEY) heartbeatPing();
  });
})();
</script>
<script>
(function () {
  if (window.__agroInAppTabsBootstrap) return;
  window.__agroInAppTabsBootstrap = true;
  if (window.top !== window.self) return;

  var USER_SLOTS = 3;
  /** Total: 1 PDV + 3 selecionadas = 4 */
  function pdvHref() {
    try {
      return new URL('/pdv/', location.origin).href;
    } catch (_) {
      return '/pdv/';
    }
  }

  function pathSegmentUpper(absUrlOrPathStr) {
    try {
      var p = typeof absUrlOrPathStr === 'string' && absUrlOrPathStr.indexOf('http') === 0 ? new URL(absUrlOrPathStr).pathname : String(absUrlOrPathStr || '/');
      p = p.split('?')[0].toLowerCase();
      var segs = p.replace(/^\/+|\/$/g, '').split('/').filter(Boolean);
      var s = segs.length ? segs[segs.length - 1] : 'INÍCIO';
      var out = String(s).replace(/-/g, ' ');
      out = out.length > 26 ? out.slice(0, 22) + '…' : out;
      return out.replace(/\b\s+\b/g, ' ').trim().toUpperCase();
    } catch (_) {
      return 'ABA';
    }
  }

  /** Título bruto do documento no iframe (mesma origem). */
  function iframeDocumentTitleRaw(iframeEl) {
    try {
      var td = iframeEl.contentDocument || iframeEl.contentWindow.document;
      return td && td.title ? String(td.title).trim() : '';
    } catch (_) {
      return '';
    }
  }

  /**
   * Texto da aba a partir de <title>: suporta "Página | SisVale" e "SisVale | Página"
   * (este projeto usa os dois). Se sobrar só marca (ex. SisVale), devolve '' para cair no menu/URL.
   */
  function tabLabelFromDocumentTitle(raw) {
    var t = String(raw || '')
      .replace(/\s+/g, ' ')
      .trim();
    if (!t) return '';
    var parts = t.split(/\s*\|\s*/).map(function (s) {
      return s.trim();
    }).filter(Boolean);
    var BRAND = /^(sisvale|gm\s*agro|sis\s*vale)$/i;
    var pick = '';
    if (parts.length >= 2) {
      if (BRAND.test(parts[0]) && !BRAND.test(parts[parts.length - 1])) {
        pick = parts[parts.length - 1];
      } else if (!BRAND.test(parts[0]) && BRAND.test(parts[parts.length - 1])) {
        pick = parts[0];
      } else {
        pick = parts[0];
      }
    } else {
      pick = parts[0] || '';
    }
    if (!pick) return '';
    if (BRAND.test(pick)) return '';
    if (pick.length > 44) pick = pick.slice(0, 40) + '…';
    return pick.toUpperCase();
  }

  function tabLabelFromMenuItem(title) {
    if (!title) return '';
    return String(title).trim().toUpperCase();
  }

  function withEmbedParam(absUrl) {
    try {
      var u = new URL(absUrl, location.href);
      if (u.origin !== location.origin) return absUrl;
      if (!u.searchParams.has('agro_inapp_embed')) u.searchParams.set('agro_inapp_embed', '1');
      return u.toString();
    } catch (_) {
      return absUrl;
    }
  }

  function pathLookLikePDV(uriPathOnly) {
    var p = String(uriPathOnly || '').toLowerCase().split('?')[0];
    return p === '/pdv' || p.indexOf('/pdv/') === 0;
  }

  function normPathUrl(absUrlStr) {
    try {
      var u = new URL(absUrlStr, location.origin);
      var p = u.pathname.replace(/\/$/, '') || '/';
      return { path: p.toLowerCase(), search: u.search || '' };
    } catch (_) {
      return { path: '', search: '' };
    }
  }

  /** Casa URL carregada com o menu inicial (prioridade maior = path mais longo / match exato). */
  function launcherTitleForUrl(absUrlStr) {
    var rows = launcherRows();
    if (!absUrlStr || !rows.length) return '';
    var t = normPathUrl(absUrlStr);
    var tp = t.path;
    var ts = t.search;
    if (!tp) return '';
    var best = '';
    var bestRank = -1;
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      if (!row.href || row.disabled) continue;
      var h;
      try {
        h = normPathUrl(row.href);
      } catch (_) {
        continue;
      }
      var rp = h.path;
      var rs = h.search;
      var rank = -1;
      if (rp === tp && rs === ts) rank = 300000 + rp.length;
      else if (rp === tp) rank = 150000 + rp.length;
      else if (rp !== '/' && tp.indexOf(rp + '/') === 0) rank = rp.length;
      if (rank > bestRank && row.title) {
        bestRank = rank;
        best = row.title;
      }
    }
    return best;
  }

  /** Rótulo da aba: título da página (quando não for só marca) → menu inicial → último segmento da URL. */
  function resolveTabLabel(iframeEl, absUrl) {
    if (iframeEl) {
      var docRaw = iframeDocumentTitleRaw(iframeEl);
      var fromDoc = tabLabelFromDocumentTitle(docRaw);
      if (fromDoc) return fromDoc;
    }
    if (absUrl) {
      var navTitle = launcherTitleForUrl(absUrl);
      if (navTitle) return tabLabelFromMenuItem(navTitle);
      return pathSegmentUpper(absUrl);
    }
    return 'TELA';
  }

  /** Lista estática apenas se falhar JSON do servidor (idem menu inicial). */
  var PRESETS_FALLBACK = [
    { title: 'Logística · Transf.', href: '/transferencias/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Lançamentos', href: '/lancamentos/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Compras', href: '/compras/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Entregas', href: '/entregas/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'PDV Checkout', href: '/pdv/checkout/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Dashboard BI', href: '/dashboard/gerencial/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Financeiro ger.', href: '/financeiro/resumo-gerencial/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Entrada NF', href: '/entrada-nota/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Estoque sync', href: '/estoque/sincronizacao/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Vendas', href: '/vendas/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Clientes', href: '/clientes/', shortcut: '', disabled: false, pin_protected: true },
    { title: 'Caixa', href: '/caixa/', shortcut: '', disabled: false, pin_protected: true },
  ];

  function readHomeLauncherRows() {
    var el = document.getElementById('agro-home-nav-data');
    if (!el || !el.textContent) return null;
    try {
      var data = JSON.parse(el.textContent);
      return Array.isArray(data) && data.length ? data : null;
    } catch (_) {
      return null;
    }
  }

  function launcherRows() {
    return readHomeLauncherRows() || PRESETS_FALLBACK;
  }

  function presetButtonLabel(it) {
    var t = (it && it.title) ? String(it.title) : 'Tela';
    var s = it && it.shortcut ? String(it.shortcut).trim() : '';
    return s ? t + ' · ' + s : t;
  }

  function launchFromLauncherItem(absResolved, pinProtected) {
    function go() {
      occupyUserSlotWithUrl(absResolved);
    }
    if (pinProtected && typeof window.gmSspinProtegerAcao === 'function') {
      window.gmSspinProtegerAcao(go);
    } else {
      go();
    }
  }

  var shell = {
    bar: null,
    stackEl: null,
    paneEl: null,
    pdvBtn: null,
    pdvPane: null,
    pdvIframe: null,
    plusBtn: null,
    wrapEl: null,
    userWraps: [],
    userSlots: [null, null, null],
    activeWhich: null,
    presetBackdrop: null,
    presetPanel: null,
  };

  function setTabGlow(el, on) {
    if (!el) return;
    el.classList.toggle('agro-inapp-tab-active', !!on);
  }

  function showWhich(which) {
    shell.activeWhich = which;
    if (shell.wrapEl)
      shell.wrapEl.style.display = which === 'prim' ? 'block' : 'none';

    shell.pdvPane && shell.pdvPane.classList.toggle('agro-inapp-pane-active', which === 'pdv');

    var u = 0;
    for (; u < USER_SLOTS; u++) {
      var S = shell.userSlots[u];
      if (S && S.paneEl) S.paneEl.classList.toggle('agro-inapp-pane-active', which === 'u' + u);
    }

    setTabGlow(shell.pdvBtn, which === 'pdv');
    for (u = 0; u < USER_SLOTS; u++) {
      var tbtn = shell.userSlots[u];
      if (tbtn && tbtn.mainBtn) setTabGlow(tbtn.mainBtn, which === 'u' + u);
    }

    document.body.classList.toggle('agro-inapp-show-primary', which === 'prim');
    document.body.classList.toggle('agro-inapp-show-pane', which !== 'prim');
  }

  function nextFreeSlot() {
    for (var z = 0; z < USER_SLOTS; z++) if (!shell.userSlots[z]) return z;
    return -1;
  }

  function ensurePresetMarkup() {
    if (shell.presetBackdrop) return;
    var bd = document.createElement('div');
    bd.id = 'agro-inapp-preset-backdrop';
    shell.presetBackdrop = bd;
    var pan = document.createElement('div');
    pan.id = 'agro-inapp-preset-panel';
    shell.presetPanel = pan;
    var tit = document.createElement('div');
    tit.className = 'agro-presets-title';
    tit.textContent = 'Menus do início — escolha a tela';
    pan.appendChild(tit);
    var rows = launcherRows();
    for (var p = 0; p < rows.length; p++) {
      (function (item) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'agro-preset-item';
        b.textContent = presetButtonLabel(item);
        var dis = !!(item.disabled || !(item.href && String(item.href).trim()));
        if (dis) {
          b.disabled = true;
        } else {
          b.onclick = function () {
            hidePresetPick();
            var hrefSrc = String(item.href).trim();
            var resolved = absUrl(hrefSrc);
            launchFromLauncherItem(resolved, !!item.pin_protected);
          };
        }
        pan.appendChild(b);
      })(rows[p]);
    }
    bd.onclick = function () {
      hidePresetPick();
    };
    document.body.appendChild(bd);
    document.body.appendChild(pan);
    pan.onclick = function (ev) {
      ev.stopPropagation();
    };
  }

  function absUrl(rel) {
    try {
      return new URL(rel, location.origin).href;
    } catch (_) {
      return rel;
    }
  }

  function showPresetPick() {
    mountShellEnsure();
    ensurePresetMarkup();
    shell.presetBackdrop.classList.add('agro-show');
    shell.presetPanel.classList.add('agro-show');
  }

  function hidePresetPick() {
    if (shell.presetBackdrop) shell.presetBackdrop.classList.remove('agro-show');
    if (shell.presetPanel) shell.presetPanel.classList.remove('agro-show');
  }

  window.__agroShowPresetLauncher = showPresetPick;

  function wireIframeTitleSync(slotIx, iframeEl, labelBtn) {
    function pull() {
      var u = shell.userSlots[slotIx] && shell.userSlots[slotIx].url;
      labelBtn.textContent = resolveTabLabel(iframeEl, u || '');
    }
    iframeEl.addEventListener('load', pull);
    setTimeout(pull, 650);
    setInterval(pull, 3200);
  }

  function wirePdvTabLabelSync() {
    function pull() {
      var lab = resolveTabLabel(shell.pdvIframe, pdvHref());
      shell.pdvBtn.textContent = lab;
      shell.pdvBtn.title = lab;
    }
    shell.pdvIframe.addEventListener('load', pull);
    setTimeout(pull, 450);
    setTimeout(pull, 1200);
    setInterval(pull, 3200);
  }

  function occupyUserSlotWithUrl(absUrlRaw, forceSlotIx, stripPrimaryDup) {
    mountShellEnsure();
    var resolved = '';
    try {
      resolved = new URL(absUrlRaw || '/', location.href).href;
    } catch (_) {
      resolved = '/';
    }
    var ix = typeof forceSlotIx === 'number' ? forceSlotIx : nextFreeSlot();
    if (ix < 0) {
      try {
        alert('Já há 3 telas extras. Feche uma (×) para abrir outra.');
      } catch (_) {}
      return;
    }

    /** remove slot antiga mesmo índice se existia */
    if (shell.userSlots[ix]) destroyUserSlot(ix);

    shell.userSlots[ix] = { url: resolved };

    var wrap = document.createElement('span');
    wrap.className = 'agro-inapp-user-tab-wrap';
    var hdr = document.createElement('button');
    hdr.type = 'button';
    hdr.className = 'agro-inapp-tab';
    hdr.setAttribute('role', 'tab');
    hdr.textContent = resolveTabLabel(ifr, resolved);
    hdr.dataset.which = 'u' + ix;
    hdr.onclick = function () {
      showWhich('u' + ix);
    };
    shell.userSlots[ix].mainBtn = hdr;

    var close = document.createElement('button');
    close.type = 'button';
    close.className = 'agro-inapp-tab-close';
    close.setAttribute('aria-label', 'Fechar');
    close.textContent = '×';

    wrap.appendChild(hdr);
    wrap.appendChild(close);
    shell.userWraps[ix] = wrap;
    shell.stackEl.insertBefore(wrap, shell.plusBtn);

    var pane = document.createElement('div');
    pane.className = 'agro-inapp-pane';
    pane.dataset.which = 'u' + ix;
    var ifr = document.createElement('iframe');
    ifr.className = 'agro-inapp-iframe';
    ifr.loading = 'eager';
    ifr.src = withEmbedParam(resolved);
    ifr.title = 'SisVale';
    pane.appendChild(ifr);
    shell.paneEl.appendChild(pane);

    shell.userSlots[ix].paneEl = pane;
    shell.userSlots[ix].iframe = ifr;
    wireIframeTitleSync(ix, ifr, hdr);

    close.onclick = function (ev) {
      ev.preventDefault();
      ev.stopPropagation();
      destroyUserSlot(ix);
    };

    if (stripPrimaryDup && shell.wrapEl) {
      ifr.addEventListener(
        'load',
        function stripDup() {
          try {
            shell.wrapEl.innerHTML = '';
          } catch (_) {}
        },
        { once: true }
      );
    }

    showWhich('u' + ix);
  }

  function destroyUserSlot(ix) {
    var S = shell.userSlots[ix];
    if (!S) return;
    if (S.paneEl && S.paneEl.parentNode) S.paneEl.parentNode.removeChild(S.paneEl);
    var w = shell.userWraps[ix];
    if (w && w.parentNode) w.parentNode.removeChild(w);
    shell.userSlots[ix] = null;
    shell.userWraps[ix] = null;
    if (shell.activeWhich === 'u' + ix) {
      showWhich('pdv');
    }
  }

  function mountShellEnsure() {
    if (shell.bar && document.body.contains(shell.bar)) return;
    mountShell();
  }

  function mountShell() {
    if (shell.rail && shell.rail.parentNode === document.body) return;
    var b = document.body;
    shell.bar = document.createElement('div');
    shell.bar.id = 'agro-inapp-tabs-bar';

    shell.stackEl = document.createElement('div');
    shell.stackEl.id = 'agro-inapp-tabs-stack';

    shell.pdvBtn = document.createElement('button');
    shell.pdvBtn.type = 'button';
    shell.pdvBtn.className = 'agro-inapp-tab agro-inapp-tab-pdv';
    shell.pdvBtn.textContent = 'PDV';
    shell.pdvBtn.title = 'Ponto de venda';
    shell.pdvBtn.onclick = function () {
      showWhich('pdv');
    };

    shell.plusBtn = document.createElement('button');
    shell.plusBtn.type = 'button';
    shell.plusBtn.className = 'agro-inapp-tab agro-inapp-tab-plus';
    shell.plusBtn.setAttribute('aria-label', 'Adicionar tela à escolha');
    shell.plusBtn.title = 'Escolher outra área do sistema (máx. 3 além do PDV)';
    shell.plusBtn.textContent = '+';
    shell.plusBtn.onclick = function () {
      showPresetPick();
    };

    shell.stackEl.appendChild(shell.pdvBtn);
    shell.stackEl.appendChild(shell.plusBtn);
    shell.bar.appendChild(shell.stackEl);

    shell.rail = document.createElement('div');
    shell.rail.id = 'agro-inapp-sidebar-rail';
    shell.rail.setAttribute('aria-label', 'Painel lateral de telas SisVale');
    shell.rail.appendChild(shell.bar);

    shell.paneEl = document.createElement('div');
    shell.paneEl.id = 'agro-inapp-pane-stack';

    shell.pdvPane = document.createElement('div');
    shell.pdvPane.className = 'agro-inapp-pane';
    shell.pdvIframe = document.createElement('iframe');
    shell.pdvIframe.className = 'agro-inapp-iframe';
    shell.pdvIframe.src = withEmbedParam(pdvHref());
    shell.pdvIframe.loading = 'eager';
    shell.pdvPane.appendChild(shell.pdvIframe);

    shell.paneEl.appendChild(shell.pdvPane);
    wirePdvTabLabelSync();

    b.insertBefore(shell.rail, b.firstChild);
    shell.wrapEl = document.createElement('div');
    shell.wrapEl.id = 'agro-inapp-primary-wrap';
    while (shell.rail.nextSibling) shell.wrapEl.appendChild(shell.rail.nextSibling);
    b.insertBefore(shell.wrapEl, shell.rail.nextSibling);
    b.appendChild(shell.paneEl);

    shell.userWraps = [null, null, null];
    shell.userSlots = [null, null, null];

    b.classList.add('agro-has-inapp-tabbar');

    var pathNow = (location.pathname || '').split('?')[0];

    /** Se já está no PDV, mostra só o iframe PDV esconde cópia duplicada do DOM inicial */
    if (pathLookLikePDV(pathNow)) {
      shell.wrapEl.style.display = 'none';
      try {
        shell.wrapEl.innerHTML = '';
      } catch (_) {}
      showWhich('pdv');
    } else {
      /** Primeira tela vira primeira das 3 abas opcionais; remove HTML duplicado após iframe carregar */
      occupyUserSlotWithUrl(location.href.split('#')[0], 0, true);
    }

    hidePresetPick();
  }

  window.__agroInAppAddTab = function (urlStr) {
    mountShellEnsure();
    var u = urlStr ? String(urlStr).split('#')[0] : location.href.split('#')[0];
    occupyUserSlotWithUrl(u, undefined, false);
  };

  document.addEventListener(
    'keydown',
    function (e) {
      if (e.key === 'Escape' && shell.presetBackdrop && shell.presetBackdrop.classList.contains('agro-show')) {
        hidePresetPick();
        return;
      }
      var ctrl = e.ctrlKey || e.metaKey;
      if (!ctrl || e.altKey || e.shiftKey) return;
      if (e.key !== 't' && e.code !== 'KeyT') return;
      var tg = e.target && e.target.tagName && e.target.tagName.toUpperCase();
      if (tg === 'INPUT' || tg === 'TEXTAREA' || tg === 'SELECT') return;
      if (e.target && e.target.isContentEditable) return;
      try {
        mountShellEnsure();
      } catch (_) {}
      e.preventDefault();
      showPresetPick();
    },
    true
  );

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mountShell, { once: true });
  else mountShell();
})();
</script>
