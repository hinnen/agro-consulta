<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Mais | Pedido de Compra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-4">

    <div class="max-w-6xl mx-auto flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">📦 PAINEL DE <span class="text-orange-500">COMPRAS</span></h1>
        <a href="/" class="text-xs font-bold text-slate-500 hover:text-slate-800 uppercase bg-white shadow-sm px-4 py-2 rounded-lg transition-colors border border-slate-200">Voltar ao PDV</a>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Coluna da Busca -->
        <div class="lg:col-span-2 space-y-4">
            <input type="text" id="busca" placeholder="🔍 Buscar por nome, GM, EAN ou marca..." autocomplete="off"
                class="w-full p-6 rounded-3xl bg-white border border-slate-200 text-xl font-bold outline-none focus:border-orange-500 focus:ring-4 focus:ring-orange-500/20 shadow-sm text-slate-800 placeholder:text-slate-400 transition-all">
            
            <div id="resultados" class="grid gap-3"></div>
        </div>

        <!-- Coluna do Carrinho -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl h-fit sticky top-4 border border-slate-200">
            <h3 class="text-orange-500 font-black uppercase italic mb-4 tracking-widest text-sm flex justify-between items-center">
                <span>📝 Lista de Pedido</span>
                <span id="itens-badge" class="bg-slate-100 text-slate-500 border border-slate-200 px-2 py-1 rounded-lg text-[10px]">0 itens</span>
            </h3>
            <div id="carrinho" class="space-y-3 mb-6 max-h-[500px] overflow-y-auto pr-2 hide-scroll"></div>
            
            <div class="border-t border-slate-100 pt-4 space-y-3">
                <div class="flex justify-between items-center px-2 pb-2">
                    <span class="text-xs text-slate-400 font-bold uppercase">Total Estimado:</span>
                    <span id="total-estimado" class="text-2xl text-emerald-600 font-black tabular-nums">R$ 0.00</span>
                </div>
                <button onclick="copiarLista()" class="w-full bg-slate-100 text-slate-700 font-black py-4 rounded-2xl uppercase italic text-xs hover:bg-slate-200 transition-all shadow-sm active:scale-95">📋 Copiar Lista</button>
                <button onclick="enviarWhatsapp()" class="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl uppercase italic text-xs hover:bg-emerald-600 shadow-md shadow-emerald-500/30 transition-all active:scale-95">🚀 Enviar Fornecedor</button>
                <button onclick="limpar()" class="w-full text-slate-400 hover:text-red-500 font-bold text-[10px] uppercase transition-colors pt-2">Limpar Tudo</button>
            </div>
        </div>
    </div>

<script>
let lista = [];
let baseProdutos = [];

function formatarMoeda(valor) {
    return `R$ ${Number(valor || 0).toFixed(2)}`;
}

function normalizarBuscaLocal(texto) {
    return String(texto || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}

function escapeHtml(texto) {
    return String(texto || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function carregarBaseLocal() {
    const div = document.getElementById('resultados');
    div.innerHTML = '<div class="text-orange-500 p-6 text-center font-bold animate-pulse border border-orange-200 rounded-3xl bg-orange-50">⏳ Baixando base completa do ERP...</div>';
    
    // O Date.now() impede o navegador de usar cache antigo!
    fetch('/api/todos-produtos/?v=' + Date.now())
        .then(r => r.json())
        .then(d => {
            if(d.produtos) {
                baseProdutos = d.produtos;
                div.innerHTML = `<div class="text-emerald-600 p-6 text-center font-black border border-emerald-200 rounded-3xl bg-emerald-50 uppercase tracking-widest text-sm">✅ ${baseProdutos.length} itens carregados na memória!</div>`;
                setTimeout(() => div.innerHTML = '', 2500);
            }
        })
        .catch(e => {
            div.innerHTML = `<div class="text-red-500 p-6 text-center font-bold border border-red-200 rounded-3xl bg-red-50">❌ Erro ao conectar no ERP. Atualize a página.</div>`;
        });
}

window.addEventListener('load', carregarBaseLocal);

// --- FUNÇÃO DE AJUSTE RÁPIDO DE ESTOQUE ---
function abrirAjuste(id, nome, saldoAtual, codigo, deposito) {
    const novo = prompt(`[AJUSTE - LOJA ${deposito.toUpperCase()}]\nProduto: ${nome}\n\nSaldo atual no sistema: ${saldoAtual}\nDigite a nova quantidade real contada:`);
    if (novo === null || novo.trim() === '') return;
    
    const pin = prompt("🔐 Digite seu PIN de Autorização (4 dígitos):");
    if (!pin) return;

    const fd = new FormData();
    fd.append('produto_id', id);
    fd.append('nome_produto', nome);
    fd.append('codigo_interno', codigo);
    fd.append('saldo_atual', saldoAtual);
    fd.append('novo_saldo', novo);
    fd.append('deposito', deposito);
    fd.append('pin', pin);
    fd.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    fetch("/api/ajustar/", {
        method: 'POST',
        body: fd
    })
    .then(res => res.json())
    .then(d => {
        if (d.ok) {
            alert("✅ Estoque ajustado com sucesso!");
            carregarBaseLocal(); // Força baixar as informações de novo para refletir na tela
        } else {
            alert("❌ Acesso Negado ou Erro:\n" + d.erro);
        }
    }).catch(e => alert("Falha na comunicação com o servidor."));
}

function buscar(q) {
    const div = document.getElementById('resultados');
    const termoOriginal = q.trim();
    
    if(termoOriginal.length < 2) { 
        div.innerHTML = ''; 
        return; 
    }

    if(baseProdutos.length === 0) {
        div.innerHTML = '<div class="text-slate-400 p-4 text-center font-bold">Aguarde a carga inicial...</div>';
        return;
    }

    const termoBusca = normalizarBuscaLocal(termoOriginal);
    const palavras = termoBusca.split(/\s+/);
    
    let resultados = baseProdutos.filter(p => {
        if (normalizarBuscaLocal(p.codigo_nfe) === termoBusca || normalizarBuscaLocal(p.codigo_barras) === termoBusca) {
            return true;
        }
        return palavras.every(palavra => p.busca_texto.includes(palavra));
    });

    if (resultados.length === 0) {
        div.innerHTML = `<div class="bg-white text-slate-400 border border-slate-200 shadow-sm p-6 rounded-3xl font-bold text-center">Nenhum produto encontrado para "${termoOriginal}".</div>`;
        return;
    }

    resultados.sort((a, b) => a.nome.localeCompare(b.nome)); 
    resultados = resultados.slice(0, 50);
    div.innerHTML = ''; 
    
    resultados.forEach(p => {
        const nomeReal = p.nome || 'PRODUTO SEM NOME';
        const nomeSeguro = nomeReal.replace(/'/g, "\\'").replace(/"/g, "&quot;");
        const marcaSegura = p.marca || 'GENÉRICO';
        const gmCode = p.codigo_nfe || p.codigo_barras || 'S/N';
        const custoSeco = Number(p.preco_custo || 0).toFixed(2);
        const custoFinal = Number(p.preco_custo_acrescimo || 0).toFixed(2);
        const precoVenda = Number(p.preco_venda || 0).toFixed(2);
        const lucroReais = (precoVenda - custoFinal).toFixed(2);
        const lucroPerc = custoFinal > 0 ? (((precoVenda - custoFinal) / custoFinal) * 100).toFixed(1) : 100;
        const corLucro = (precoVenda - custoFinal) >= 0 ? "text-emerald-500" : "text-red-500";
        
        const foto = p.imagem && p.imagem !== '' && p.imagem !== 'None' ? p.imagem : `https://ui-avatars.com/api/?name=${encodeURIComponent(nomeReal)}&background=f1f5f9&color=64748b&font-size=0.3`;

        div.innerHTML += `
            <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-200 hover:border-orange-400 hover:bg-orange-50/30 shadow-sm transition-all cursor-pointer group" 
                 onclick="add('${p.id}', '${nomeSeguro}', ${custoFinal})">
                
                <div class="flex items-center gap-4 flex-1 min-w-0 pr-4">
                    <img src="${foto}" class="w-12 h-12 object-cover rounded-xl bg-slate-50 border border-slate-200 shadow-sm p-0.5 hidden sm:block">
                    
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1.5">
                            <span class="text-[10px] font-bold text-slate-400 uppercase truncate">${escapeHtml(marcaSegura)}</span>
                            <span class="text-[9px] font-black text-slate-500 uppercase bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200 tracking-widest">GM: ${escapeHtml(gmCode)}</span>
                        </div>
                        <div class="font-black text-sm uppercase text-slate-800 group-hover:text-orange-600 transition-colors truncate">${escapeHtml(nomeReal)}</div>
                        <div class="flex items-center gap-3 mt-1.5">
                            <div class="text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded border border-emerald-200 font-black uppercase tracking-wider text-xs shadow-sm">
                                Total: ${(p.saldo_centro + p.saldo_vila).toFixed(1)}
                            </div>
                            <div class="flex gap-2 text-[10px] font-bold uppercase tracking-wider">
                                <span onclick="abrirAjuste('${p.id}', '${nomeSeguro}', ${p.saldo_centro}, '${gmCode}', 'centro'); event.stopPropagation();" class="text-slate-500 bg-slate-50 px-1.5 py-0.5 rounded border border-slate-200 cursor-pointer hover:bg-slate-100 flex items-center gap-1 group/edit transition-colors" title="Ajustar Centro">
                                    C: ${p.saldo_centro} <span class="opacity-0 group-hover/edit:opacity-100 text-[11px] -mr-1">✏️</span>
                                </span>
                                <span onclick="abrirAjuste('${p.id}', '${nomeSeguro}', ${p.saldo_vila}, '${gmCode}', 'vila'); event.stopPropagation();" class="text-slate-500 bg-slate-50 px-1.5 py-0.5 rounded border border-slate-200 cursor-pointer hover:bg-slate-100 flex items-center gap-1 group/edit transition-colors" title="Ajustar Vila">
                                    V: ${p.saldo_vila} <span class="opacity-0 group-hover/edit:opacity-100 text-[11px] -mr-1">✏️</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-right shrink-0 pl-4 border-l border-slate-100 flex flex-col justify-center">
                    <div class="flex flex-col items-end mb-1.5">
                        <div class="text-slate-400 font-bold text-xs tabular-nums">R$ ${custoSeco}</div>
                        <div class="text-[8px] font-bold text-slate-400 uppercase tracking-widest leading-none mt-0.5">Custo Seco</div>
                    </div>
                    <div class="flex flex-col items-end mb-1.5">
                        <div class="text-orange-500 font-black text-lg tabular-nums leading-none">R$ ${custoFinal}</div>
                        <div class="text-[9px] font-black text-slate-600 uppercase tracking-widest mt-1">Custo Final</div>
                    </div>
                    <div class="flex flex-col items-end border-t border-slate-100 pt-1.5">
                        <div class="${corLucro} font-bold text-[10px] tabular-nums leading-none">+ R$ ${lucroReais} (${lucroPerc}%)</div>
                        <div class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Venda: R$ ${precoVenda}</div>
                    </div>
                </div>
            </div>`;
    });
}

let timerBusca;
document.getElementById('busca').addEventListener('input', (e) => {
    clearTimeout(timerBusca);
    timerBusca = setTimeout(() => buscar(e.target.value), 50);
});

document.getElementById('busca').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') {
        e.preventDefault();
        const primeiroItem = document.querySelector('#resultados > div');
        if(primeiroItem) primeiroItem.click();
    }
});

function add(id, nome, preco) {
    const qtdeStr = prompt(`Quantidade para solicitar:\n${nome}`, "1");
    if (qtdeStr === null) return;
    
    const qtde = parseInt(qtdeStr, 10);
    if (isNaN(qtde) || qtde <= 0) {
        alert("Quantidade inválida!");
        return;
    }

    const item = lista.find(i => i.id === id);
    if(item) item.qtd += qtde;
    else lista.push({id, nome, preco, qtd: qtde});
    
    render();
    
    document.getElementById('busca').value = '';
    document.getElementById('resultados').innerHTML = '';
    document.getElementById('busca').focus();
}

function render() {
    const c = document.getElementById('carrinho'); 
    c.innerHTML = '';
    let total = 0;
    let qtdItens = 0;
    
    lista.forEach((item, index) => {
        const subtotal = item.preco * item.qtd;
        total += subtotal;
        qtdItens += item.qtd;
        
        c.innerHTML += `
            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-200">
                <div class="text-[11px] font-bold uppercase min-w-0 pr-2">
                    <div class="text-orange-500 mb-0.5 text-[10px]">${item.qtd}x un.</div>
                    <div class="truncate text-slate-700 leading-tight">${item.nome}</div>
                </div>
                <div class="flex flex-col items-end gap-1 shrink-0">
                    <button onclick="remover(${index})" class="text-slate-400 font-black hover:text-red-500 text-lg leading-none transition-colors">✕</button>
                    <div class="text-xs font-black text-emerald-600 tabular-nums">R$ ${subtotal.toFixed(2)}</div>
                </div>
            </div>`;
    });
    
    document.getElementById('total-estimado').innerText = `R$ ${total.toFixed(2)}`;
    document.getElementById('itens-badge').innerText = `${qtdItens} un.`;
}

function remover(i) { lista.splice(i, 1); render(); }
function limpar() { if(confirm("Deseja realmente apagar toda a lista de compras?")) { lista = []; render(); } }

function formatarTexto() {
    let txt = "*PEDIDO DE COMPRA - AGRO MAIS*\n\n";
    let total = 0;
    lista.forEach(i => { 
        txt += `▪️ ${String(i.qtd).padStart(2, '0')}x ${i.nome}\n`; 
        total += (i.preco * i.qtd);
    });
    txt += `\n*Custo Estimado:* R$ ${total.toFixed(2)}`;
    return txt;
}

function copiarLista() {
    if(!lista.length) return alert("A lista está vazia!");
    navigator.clipboard.writeText(formatarTexto()).then(() => alert("Lista copiada com sucesso!"));
}

function enviarWhatsapp() {
    if(!lista.length) return alert("A lista está vazia!");
    window.open(`https://wa.me/?text=${encodeURIComponent(formatarTexto())}`, '_blank');
}
</script>
</body>
</html>
