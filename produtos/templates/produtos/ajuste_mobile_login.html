<!DOCTYPE html>
<html lang="pt-br" class="min-h-[100dvh]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-[100dvh] p-4 sm:p-6 pt-[max(1rem,env(safe-area-inset-top))] pb-[max(1rem,env(safe-area-inset-bottom))] touch-manipulation">
    <div class="w-full max-w-sm text-center">
        <h1 class="text-white text-2xl sm:text-3xl font-black mb-8 sm:mb-10 italic uppercase">AGRO <span class="text-emerald-500">MAIS</span></h1>
        <div class="bg-white p-6 sm:p-8 rounded-[2rem] sm:rounded-[2.5rem] shadow-2xl">
            <p class="text-slate-400 font-bold text-[10px] uppercase mb-5 sm:mb-6 tracking-widest">PIN DE ACESSO</p>
            <input type="password" id="pin" inputmode="numeric" maxlength="4" placeholder="••••" enterkeyhint="go" autocomplete="one-time-code"
                class="w-full text-center text-3xl sm:text-4xl font-black tracking-[0.75rem] sm:tracking-[1rem] p-4 bg-slate-50 rounded-2xl outline-none focus:ring-4 focus:ring-emerald-500/20">
            <button type="button" onclick="entrar()" class="w-full mt-5 sm:mt-6 bg-emerald-500 text-white font-black py-4 sm:py-5 rounded-2xl uppercase italic text-sm sm:text-base active:scale-[0.99] transition-transform">Entrar</button>
        </div>
    </div>
<script>
function entrar() {
    const fd = new FormData(); fd.append('pin', document.getElementById('pin').value);
    fetch("{% url 'api_login_mobile' %}", { method: 'POST', body: fd, headers: {'X-CSRFToken': '{{ csrf_token }}'} })
    .then(res => res.ok ? location.reload() : alert("PIN ERRADO"));
}
</script>
</body>
</html>
