# Blueprint Render — Web Service HTTP público.
# Após commit, no painel: New → Blueprint (ou vincule este repo ao serviço existente).
# Ajuste o nome do serviço se quiser.
#
# Cron de ping Mongo: roda em processo separado (não atende usuários do PDV). Anexe ao
# serviço cron o mesmo Environment Group do web (Mongo, DATABASE_URL, DJANGO_SETTINGS_MODULE, etc.).
services:
  # PRODUÇÃO — branch producao → serviço "Sistvale - Produção" no painel Render.
  - type: web
    name: agro-consulta
    branch: producao
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --preload --timeout 180 --graceful-timeout 45 --no-control-socket --access-logfile - --error-logfile -
    healthCheckPath: /healthz
    # Produção com domínio próprio: AGRO_CANONICAL_ORIGIN=https://www.example.com.br
    # Redis (opcional): REDIS_URL no mesmo env do web.
    # Painel fechado: AGRO_PUBLIC_DASHBOARD=false

  # TESTE — commits do Cursor na branch `teste`.
  - type: web
    name: agro-consulta-teste
    branch: teste
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --preload --timeout 180 --graceful-timeout 45 --no-control-socket --access-logfile - --error-logfile -
    healthCheckPath: /healthz
    # Ex.: AGRO_ERP_PEDIDOS_DRY_RUN=true, AGRO_FONTE_CATALOGO=legacy (homolog desvinculação ERP)

  - type: cron
    name: agro-estoque-mongo-ping
    runtime: python
    # A cada 10 min: um find_one no Mongo + gravação em EstoqueSyncHealth (erros acumulam em falhas_sequenciais_mongo).
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py estoque_mongo_ping
